<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grile Cisco 15.6.2 - Application Layer</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0ea5e9;
      --accent-dark: #0284c7;
      --ok: #16a34a;
      --bad: #dc2626;
      --border: #dbe3ef;
      --soft: #eef6ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef6ff 0%, var(--bg) 240px);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      max-width: 1050px;
      margin: 0 auto;
      padding: 34px 18px 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 40px);
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      max-width: 780px;
    }

    main {
      max-width: 1050px;
      margin: 0 auto;
      padding: 12px 18px 50px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244, 247, 251, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 18px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    .toolbar .score {
      font-weight: 700;
      color: var(--text);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .08s ease, background .2s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .primary {
      background: var(--accent);
      color: white;
    }

    .primary:hover { background: var(--accent-dark); }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .quiz-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      margin: 18px 0;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
    }

    .q-head {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 32px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--accent-dark);
      font-weight: 800;
    }

    .multi-note {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .question {
      font-size: 18px;
      font-weight: 700;
      margin: 8px 0 14px;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    label.option {
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 12px;
      align-items: start;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
    }

    label.option:hover { background: #f8fafc; }
    input { margin-top: 4px; transform: scale(1.15); }

    .feedback {
      display: none;
      margin-top: 15px;
      padding: 13px 14px;
      border-radius: 12px;
      font-weight: 700;
    }

    .feedback.ok {
      display: block;
      background: #dcfce7;
      color: #14532d;
      border: 1px solid #86efac;
    }

    .feedback.bad {
      display: block;
      background: #fee2e2;
      color: #7f1d1d;
      border: 1px solid #fca5a5;
    }

    .correct-answer {
      margin-top: 8px;
      font-weight: 400;
    }

    .correct-highlight {
      border-color: #86efac !important;
      background: #f0fdf4 !important;
    }

    .wrong-highlight {
      border-color: #fca5a5 !important;
      background: #fff1f2 !important;
    }

    footer {
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      padding: 12px 0 34px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Grile Cisco - 15.6.2 Application Layer</h1>
    <p class="subtitle">Quiz interactiv cu 15 întrebări. Bifează răspunsul/răspunsurile, apoi apasă „Verifică răspunsurile".</p>
  </header>

  <main>
    <section class="toolbar">
      <div class="score" id="scoreBox">Scor: neverificat</div>
      <div>
        <button class="primary" onclick="checkQuiz()">Verifică răspunsurile</button>
        <button class="secondary" onclick="resetQuiz()">Resetează</button>
      </div>
    </section>

    <form id="quizForm"></form>
  </main>

  <footer>
    Fișier HTML generat pentru exersare individuală.
  </footer>

  <script>
    const questions = [
      {
        text: "Într-o rețea de acasă, care dispozitiv este cel mai probabil să furnizeze adresare IPv4 dinamică clienților din rețeaua locală?",
        type: "single",
        options: [
          "Un server DHCP al ISP-ului",
          "Un router de acasă",
          "Un server de fișiere dedicat",
          "Un server DNS"
        ],
        answer: [1]
      },
      {
        text: "Ce parte a URL-ului http://www.cisco.com/index.html reprezintă domeniul DNS de nivel superior (top-level DNS domain)?",
        type: "single",
        options: [
          "Http",
          ".com",
          "Www",
          "Index"
        ],
        answer: [1]
      },
      {
        text: "Care sunt două caracteristici ale nivelului aplicație (application layer) din modelul TCP/IP? (Alegeți două.)",
        type: "multi",
        choose: 2,
        options: [
          "Crearea și menținerea dialogului între aplicațiile sursă și destinație",
          "Cel mai aproape de utilizatorul final",
          "Responsabilitate pentru adresarea fizică",
          "Responsabilitate pentru adresarea logică"
        ],
        answer: [0, 1]
      },
      {
        text: "Ce tip de mesaj este folosit de un client HTTP pentru a solicita date de la un server web?",
        type: "single",
        options: [
          "POST",
          "PUT",
          "GET",
          "ACK"
        ],
        answer: [2]
      },
      {
        text: "Ce protocol poate fi folosit pentru a transfera mesaje de la un server de e-mail la un client de e-mail?",
        type: "single",
        options: [
          "POP3",
          "SNMP",
          "HTTP",
          "SMTP"
        ],
        answer: [0]
      },
      {
        text: "Ce protocol de la nivelul aplicație este folosit pentru a oferi servicii de partajare fișiere și imprimare aplicațiilor Microsoft?",
        type: "single",
        options: [
          "SMB",
          "HTTP",
          "SMTP",
          "DHCP"
        ],
        answer: [0]
      },
      {
        text: "Care trei protocoale sau standarde sunt folosite la nivelul aplicație al modelului TCP/IP? (Alegeți trei.)",
        type: "multi",
        choose: 3,
        options: [
          "TCP",
          "UDP",
          "HTTP",
          "GIF",
          "MPEG",
          "IP"
        ],
        answer: [2, 3, 4]
      },
      {
        text: "De ce este preferat DHCP pentru IPv4 în rețelele mari?",
        type: "single",
        options: [
          "Gazdele din rețelele mari necesită mai multe setări de configurare a adreselor IPv4 decât cele din rețelele mici.",
          "Rețelele mari trimit mai multe cereri de rezolvare domeniu-la-adresă IP decât rețelele mai mici.",
          "Previne partajarea fișierelor cu drepturi de autor.",
          "Este o modalitate mai eficientă de gestionare a adreselor IPv4 față de atribuirea statică.",
          "DHCP folosește un protocol de transport fiabil."
        ],
        answer: [3]
      },
      {
        text: "Un autor încarcă un document capitol de pe un calculator personal pe serverul de fișiere al unui editor de cărți. Ce rol joacă calculatorul personal în acest model de rețea?",
        type: "single",
        options: [
          "Master",
          "Client",
          "Slave",
          "Server",
          "Tranzient"
        ],
        answer: [1]
      },
      {
        text: "Care afirmație este adevărată despre FTP?",
        type: "single",
        options: [
          "FTP este o aplicație peer-to-peer.",
          "Clientul poate descărca date de pe server sau le poate încărca pe server.",
          "Clientul poate alege dacă FTP va stabili una sau două conexiuni cu serverul.",
          "FTP nu asigură fiabilitate în timpul transmisiei datelor."
        ],
        answer: [1]
      },
      {
        text: "O gazdă wireless trebuie să solicite o adresă IPv4. Ce protocol ar fi folosit pentru a procesa cererea?",
        type: "single",
        options: [
          "ICMP",
          "DHCP",
          "HTTP",
          "FTP",
          "SNMP"
        ],
        answer: [1]
      },
      {
        text: "Care nivel al modelului TCP/IP este cel mai aproape de utilizatorul final?",
        type: "single",
        options: [
          "Internet",
          "Transport",
          "Aplicație (Application)",
          "Acces la rețea (Network access)"
        ],
        answer: [2]
      },
      {
        text: "La recuperarea mesajelor de e-mail, ce protocol permite stocarea centralizată și backup-ul ușor al e-mailurilor, dezirabil pentru o întreprindere mică sau mijlocie?",
        type: "single",
        options: [
          "POP",
          "SMTP",
          "HTTPS",
          "IMAP"
        ],
        answer: [3]
      },
      {
        text: "Ce protocol folosește criptarea (encryption)?",
        type: "single",
        options: [
          "DHCP",
          "FTP",
          "DNS",
          "HTTPS"
        ],
        answer: [3]
      },
      {
        text: "Care două sarcini pot fi efectuate de un server DNS local? (Alegeți două.)",
        type: "multi",
        choose: 2,
        options: [
          "Permiterea transferului de date între două dispozitive de rețea",
          "Transmiterea cererilor de rezolvare a numelor între servere (forwarding)",
          "Recuperarea mesajelor de e-mail",
          "Furnizarea de adrese IP gazdelor locale",
          "Maparea numelor la adrese IP pentru gazdele interne"
        ],
        answer: [1, 4]
      }
    ];

    const form = document.getElementById('quizForm');

    function renderQuiz() {
      form.innerHTML = '';
      questions.forEach((q, qi) => {
        const card = document.createElement('section');
        card.className = 'quiz-card';
        card.id = `q${qi}`;

        const head = document.createElement('div');
        head.className = 'q-head';
        head.innerHTML = `<span class="badge">Q${qi + 1}</span><strong>Întrebarea ${qi + 1} din ${questions.length}</strong>`;
        card.appendChild(head);

        const question = document.createElement('div');
        question.className = 'question';
        question.textContent = q.text;
        card.appendChild(question);

        if (q.type === 'multi') {
          const note = document.createElement('div');
          note.className = 'multi-note';
          note.textContent = `Alege ${q.choose} răspunsuri.`;
          card.appendChild(note);
        }

        const optionsWrap = document.createElement('div');
        optionsWrap.className = 'options';

        q.options.forEach((opt, oi) => {
          const label = document.createElement('label');
          label.className = 'option';
          label.setAttribute('data-q', qi);
          label.setAttribute('data-o', oi);

          const input = document.createElement('input');
          input.type = q.type === 'single' ? 'radio' : 'checkbox';
          input.name = `q${qi}`;
          input.value = oi;

          const span = document.createElement('span');
          span.textContent = opt;

          label.appendChild(input);
          label.appendChild(span);
          optionsWrap.appendChild(label);
        });

        card.appendChild(optionsWrap);

        const feedback = document.createElement('div');
        feedback.className = 'feedback';
        feedback.id = `feedback-${qi}`;
        card.appendChild(feedback);

        form.appendChild(card);
      });
    }

    function selectedFor(qi) {
      return Array.from(document.querySelectorAll(`input[name="q${qi}"]:checked`)).map(el => Number(el.value)).sort((a, b) => a - b);
    }

    function sameArray(a, b) {
      return a.length === b.length && a.every((v, i) => v === b[i]);
    }

    function checkQuiz() {
      let correctCount = 0;

      questions.forEach((q, qi) => {
        const selected = selectedFor(qi);
        const answer = [...q.answer].sort((a, b) => a - b);
        const isCorrect = sameArray(selected, answer);
        if (isCorrect) correctCount++;

        document.querySelectorAll(`label[data-q="${qi}"]`).forEach(label => {
          label.classList.remove('correct-highlight', 'wrong-highlight');
          const oi = Number(label.getAttribute('data-o'));
          if (answer.includes(oi)) label.classList.add('correct-highlight');
          if (selected.includes(oi) && !answer.includes(oi)) label.classList.add('wrong-highlight');
        });

        const feedback = document.getElementById(`feedback-${qi}`);
        const correctText = answer.map(i => q.options[i]).join(' / ');
        feedback.className = `feedback ${isCorrect ? 'ok' : 'bad'}`;
        feedback.innerHTML = isCorrect
          ? 'Corect!'
          : `Incorect.<div class="correct-answer">Răspuns corect: ${correctText}</div>`;
      });

      const percent = Math.round((correctCount / questions.length) * 100);
      document.getElementById('scoreBox').textContent = `Scor: ${correctCount}/${questions.length} (${percent}%)`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetQuiz() {
      document.querySelectorAll('input').forEach(input => input.checked = false);
      document.querySelectorAll('.feedback').forEach(fb => {
        fb.className = 'feedback';
        fb.innerHTML = '';
      });
      document.querySelectorAll('label.option').forEach(label => {
        label.classList.remove('correct-highlight', 'wrong-highlight');
      });
      document.getElementById('scoreBox').textContent = 'Scor: neverificat';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderQuiz();
  </script>
</body>
</html>
