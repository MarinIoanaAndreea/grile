<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grile Cisco - Modul 3</title>
  <style>
    :root { --primary:#0ea5b7; --ok:#16a34a; --bad:#dc2626; --bg:#f4f7fb; --card:#fff; --text:#111827; --muted:#6b7280; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, Helvetica, sans-serif; background:var(--bg); color:var(--text); line-height:1.45; }
    header { background:linear-gradient(135deg,#0f766e,#0891b2); color:white; padding:28px 18px; text-align:center; }
    header h1 { margin:0 0 8px; font-size:28px; }
    header p { margin:0; opacity:.95; }
    main { max-width:1000px; margin:24px auto; padding:0 16px 50px; }
    .question { background:var(--card); border-radius:16px; padding:22px; margin:18px 0; box-shadow:0 8px 24px rgba(15,23,42,.08); border:1px solid #e5e7eb; }
    .qhead { display:flex; gap:10px; align-items:flex-start; margin-bottom:12px; }
    .badge { background:var(--primary); color:white; border-radius:999px; min-width:42px; height:30px; display:inline-flex; align-items:center; justify-content:center; font-weight:700; }
    .qtext { font-weight:700; font-size:17px; padding-top:3px; }
    .hint { color:var(--muted); font-size:13px; margin:4px 0 14px 52px; }
    .option { display:flex; align-items:center; gap:10px; padding:12px 14px; margin:9px 0; border:1px solid #e5e7eb; border-radius:10px; background:#f9fafb; cursor:pointer; transition:.15s ease; }
    .option:hover { border-color:#67e8f9; background:#ecfeff; }
    .option input { transform:scale(1.18); }
    .option.correct { border-color:rgba(22,163,74,.65); background:#ecfdf5; }
    .option.incorrect { border-color:rgba(220,38,38,.65); background:#fef2f2; }
    .feedback { display:none; margin-top:12px; padding:12px 14px; border-radius:10px; font-weight:600; }
    .feedback.ok { display:block; background:#dcfce7; color:#166534; }
    .feedback.bad { display:block; background:#fee2e2; color:#991b1b; }
    .controls { position:sticky; bottom:0; background:rgba(244,247,251,.96); backdrop-filter:blur(6px); padding:16px; border-top:1px solid #e5e7eb; display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    button { border:none; border-radius:999px; padding:12px 20px; font-weight:700; cursor:pointer; font-size:15px; }
    .primary { background:var(--primary); color:white; }
    .secondary { background:#e5e7eb; color:#111827; }
    #scoreBox { display:none; background:white; border-radius:16px; padding:18px; margin:20px 0; border:1px solid #e5e7eb; box-shadow:0 8px 24px rgba(15,23,42,.08); text-align:center; font-size:18px; }
    #scoreBox strong { color:var(--primary); }
  </style>
</head>
<body>
<header>
  <h1>Grile Cisco - Modul 3</h1>
  <p>Bifează răspunsul/răspunsurile, apoi apasă „Verifică răspunsurile".</p>
</header>
<main>
  <div id="scoreBox"></div>
  <form id="quizForm"></form>
</main>
<div class="controls">
  <button class="primary" onclick="checkAnswers()">Verifică răspunsurile</button>
  <button class="secondary" onclick="resetQuiz()">Resetează</button>
</div>
<script>
const questions = [
  {
    q: 'Care trei acronime reprezintă organizații de standardizare? (Alege trei.)', type: 'checkbox', choose: 3,
    options: ['IETF', 'MAC', 'OSI', 'IANA', 'TCP/IP', 'IEEE'], correct: [0,3,5]
  },
  {
    q: 'Ce tip de comunicare va trimite un mesaj tuturor dispozitivelor dintr-o rețea locală (LAN)?', type: 'radio',
    options: ['Unicast', 'Allcast', 'Multicast', 'Broadcast'], correct: [3]
  },
  {
    q: 'În comunicațiile computerizate, care este scopul codificării mesajelor?', type: 'radio',
    options: ['Pentru a negocia momentul corect al comunicației', 'Pentru a interpreta informațiile', 'Pentru a converti informațiile în forma potrivită pentru transmisie', 'Pentru a împărți mesajele mari în cadre mai mici'], correct: [2]
  },
  {
    q: 'Ce opțiune de livrare a mesajelor este folosită când toate dispozitivele trebuie să primească același mesaj simultan?', type: 'radio',
    options: ['Duplex', 'Broadcast', 'Unicast', 'Multicast'], correct: [1]
  },
  {
    q: 'Care sunt două beneficii ale utilizării unui model de rețea stratificat (layered)? (Alege două.)', type: 'checkbox', choose: 2,
    options: ['Împiedică designerii să creeze propriul model.', 'Ajută la proiectarea protocoalelor.', 'Împiedică tehnologia dintr-un strat să afecteze alte straturi.', 'Accelerează livrarea pachetelor.', 'Garantează că un dispozitiv dintr-un strat poate funcționa la stratul următor.'], correct: [1,2]
  },
  {
    q: 'Care este scopul protocoalelor în comunicațiile de date?', type: 'radio',
    options: ['Să dicteze conținutul mesajului trimis în timpul comunicării', 'Să specifice sistemele de operare ale dispozitivelor care vor susține comunicarea', 'Să specifice lățimea de bandă a canalului sau mediului pentru fiecare tip de comunicare', 'Să furnizeze regulile necesare pentru un anumit tip de comunicare'], correct: [3]
  },
  {
    q: 'Ce adresă logică este folosită pentru livrarea datelor către o rețea la distanță?', type: 'radio',
    options: ['Adresa MAC sursă', 'Adresa IP sursă', 'Adresa MAC destinație', 'Numărul de port destinație', 'Adresa IP destinație'], correct: [4]
  },
  {
    q: 'Care este termenul general folosit pentru a descrie un fragment de date la orice strat al unui model de rețea?', type: 'radio',
    options: ['Cadru (Frame)', 'Pachet (Packet)', 'Segment', 'Unitate de date a protocolului (PDU)'], correct: [3]
  },
  {
    q: 'Care două protocoale funcționează la stratul Internet? (Alege două.)', type: 'checkbox', choose: 2,
    options: ['BOOTP', 'ICMP', 'PPP', 'POP', 'IP'], correct: [1,4]
  },
  {
    q: 'Care strat al modelului OSI definește serviciile pentru segmentarea și reasamblarea datelor pentru comunicațiile individuale între dispozitivele finale?', type: 'radio',
    options: ['Prezentare (Presentation)', 'Sesiune (Session)', 'Transport', 'Aplicație (Application)', 'Rețea (Network)'], correct: [2]
  },
  {
    q: 'Ce tip de comunicare va trimite un mesaj simultan unui grup de destinații?', type: 'radio',
    options: ['Multicast', 'Broadcast', 'Anycast', 'Unicast'], correct: [0]
  },
  {
    q: 'Ce proces este folosit pentru a primi datele transmise și a le converti într-un mesaj lizibil?', type: 'radio',
    options: ['Controlul fluxului (Flow control)', 'Controlul accesului (Access control)', 'Încapsulare (Encapsulation)', 'Decodare (Decoding)'], correct: [3]
  },
  {
    q: 'Ce se face cu un pachet IP înainte de a fi transmis pe mediul fizic?', type: 'radio',
    options: ['Este segmentat în bucăți mai mici.', 'Este încapsulat într-un segment TCP.', 'Este etichetat cu informații care garantează livrarea fiabilă.', 'Este încapsulat într-un cadru de nivel 2 (Layer 2 frame).'], correct: [3]
  },
  {
    q: 'Ce proces este folosit pentru a plasa un mesaj în interiorul altui mesaj pentru transferul de la sursă la destinație?', type: 'radio',
    options: ['Încapsulare (Encapsulation)', 'Controlul fluxului (Flow control)', 'Decodare (Decoding)', 'Controlul accesului (Access control)'], correct: [0]
  },
  {
    q: 'Un client web trimite o cerere de pagină web către un server web. Din perspectiva clientului, care este ordinea corectă a stivei de protocoale folosită pentru a pregăti cererea de transmisie?', type: 'radio',
    options: ['HTTP, TCP, IP, Ethernet', 'Ethernet, TCP, IP, HTTP', 'HTTP, IP, TCP, Ethernet', 'Ethernet, IP, TCP, HTTP'], correct: [0]
  }
];

function renderQuiz() {
  const form = document.getElementById('quizForm');
  form.innerHTML = '';
  questions.forEach((item, qi) => {
    const section = document.createElement('section');
    section.className = 'question';
    const chooseText = item.type === 'checkbox' ? `Alege ${item.choose} variante.` : 'Alege o singură variantă.';
    section.innerHTML = `
      <div class="qhead"><span class="badge">${qi + 1}</span><div class="qtext">${item.q}</div></div>
      <div class="hint">${chooseText}</div>
      <div class="options"></div>
      <div class="feedback" id="fb-${qi}"></div>`;
    const optionsDiv = section.querySelector('.options');
    item.options.forEach((opt, oi) => {
      const id = `q${qi}_o${oi}`;
      const label = document.createElement('label');
      label.className = 'option';
      label.setAttribute('for', id);
      label.innerHTML = `<input id="${id}" type="${item.type}" name="q${qi}" value="${oi}"> <span>${opt}</span>`;
      optionsDiv.appendChild(label);
    });
    form.appendChild(section);
  });
}

function arraysEqual(a, b) {
  const aa = [...a].sort((x,y)=>x-y);
  const bb = [...b].sort((x,y)=>x-y);
  return aa.length === bb.length && aa.every((v,i)=>v===bb[i]);
}

function checkAnswers() {
  let score = 0;
  questions.forEach((item, qi) => {
    const selected = [...document.querySelectorAll(`input[name="q${qi}"]:checked`)].map(el => Number(el.value));
    const ok = arraysEqual(selected, item.correct);
    if (ok) score++;
    document.querySelectorAll(`input[name="q${qi}"]`).forEach(input => {
      const label = input.closest('.option');
      label.classList.remove('correct','incorrect');
      const idx = Number(input.value);
      if (item.correct.includes(idx)) label.classList.add('correct');
      if (input.checked && !item.correct.includes(idx)) label.classList.add('incorrect');
    });
    const fb = document.getElementById(`fb-${qi}`);
    fb.className = 'feedback ' + (ok ? 'ok' : 'bad');
    const correctText = item.correct.map(i => item.options[i]).join(' / ');
    fb.textContent = ok ? 'Corect!' : `Greșit. Răspuns corect: ${correctText}`;
  });
  const percent = Math.round(score / questions.length * 100);
  const box = document.getElementById('scoreBox');
  box.style.display = 'block';
  box.innerHTML = `Ai obținut <strong>${score}/${questions.length}</strong> răspunsuri corecte (${percent}%).`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetQuiz() {
  document.querySelectorAll('input').forEach(i => i.checked = false);
  document.querySelectorAll('.option').forEach(o => o.classList.remove('correct','incorrect'));
  document.querySelectorAll('.feedback').forEach(f => { f.className='feedback'; f.textContent=''; });
  document.getElementById('scoreBox').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderQuiz();
</script>
</body>
</html>
