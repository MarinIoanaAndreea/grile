<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>16.5.4 Module Quiz - Network Security Fundamentals</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0ea5e9;
      --accent-dark: #0284c7;
      --ok: #16a34a;
      --bad: #dc2626;
      --border: #dbe3ef;
      --soft: #eef6ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef6ff 0%, var(--bg) 240px);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      max-width: 1050px;
      margin: 0 auto;
      padding: 34px 18px 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 40px);
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      max-width: 780px;
    }

    main {
      max-width: 1050px;
      margin: 0 auto;
      padding: 12px 18px 50px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244, 247, 251, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 18px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    .toolbar .score {
      font-weight: 700;
      color: var(--text);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .08s ease, background .2s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .primary {
      background: var(--accent);
      color: white;
    }

    .primary:hover { background: var(--accent-dark); }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .quiz-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      margin: 18px 0;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
    }

    .q-head {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 32px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--accent-dark);
      font-weight: 800;
    }

    .multi-note {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .question {
      font-size: 18px;
      font-weight: 700;
      margin: 8px 0 14px;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    label.option {
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 12px;
      align-items: start;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
    }

    label.option:hover { background: #f8fafc; }
    input { margin-top: 4px; transform: scale(1.15); }

    .feedback {
      display: none;
      margin-top: 15px;
      padding: 13px 14px;
      border-radius: 12px;
      font-weight: 700;
    }

    .feedback.ok {
      display: block;
      background: #dcfce7;
      color: #14532d;
      border: 1px solid #86efac;
    }

    .feedback.bad {
      display: block;
      background: #fee2e2;
      color: #7f1d1d;
      border: 1px solid #fca5a5;
    }

    .correct-answer {
      margin-top: 8px;
      font-weight: 400;
    }

    .correct-highlight {
      border-color: #86efac !important;
      background: #f0fdf4 !important;
    }

    .wrong-highlight {
      border-color: #fca5a5 !important;
      background: #fff1f2 !important;
    }

    footer {
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      padding: 12px 0 34px;
    }
  </style>
</head>
<body>
  <header>
    <h1>16.5.4 Module Quiz - Network Security Fundamentals</h1>
    <p class="subtitle">Quiz interactiv cu 15 întrebări. Bifează răspunsul/răspunsurile, apoi apasă „Verifică răspunsurile".</p>
  </header>

  <main>
    <section class="toolbar">
      <div class="score" id="scoreBox">Scor: neverificat</div>
      <div>
        <button class="primary" onclick="checkQuiz()">Verifică răspunsurile</button>
        <button class="secondary" onclick="resetQuiz()">Resetează</button>
      </div>
    </section>

    <form id="quizForm"></form>
  </main>

  <footer>
    Fișier HTML generat pentru exersare individuală.
  </footer>

  <script>
    const questions = [
      {
        text: "Ce componentă este proiectată să protejeze împotriva comunicațiilor neautorizate de și către un calculator?",
        type: "single",
        options: [
          "Centru de securitate (Security center)",
          "Firewall",
          "Antivirus",
          "Antimalware",
          "Scanner de porturi (Port scanner)"
        ],
        answer: [1]
      },
      {
        text: "Ce comandă va bloca tentativele de autentificare pe RouterA pentru o perioadă de 30 de secunde, dacă există 2 autentificări eșuate în decurs de 10 secunde?",
        type: "single",
        options: [
          "RouterA(config)# login block-for 30 attempts 10 within 2",
          "RouterA(config)# login block-for 30 attempts 2 within 10",
          "RouterA(config)# login block-for 2 attempts 30 within 10",
          "RouterA(config)# login block-for 10 attempts 2 within 30"
        ],
        answer: [1]
      },
      {
        text: "Care este scopul funcției de contabilizare (accounting) din securitatea rețelei?",
        type: "single",
        options: [
          "A cere utilizatorilor să demonstreze cine sunt",
          "A furniza întrebări și răspunsuri de tip challenge-response",
          "A determina la ce resurse poate accesa un utilizator",
          "A urmări acțiunile unui utilizator"
        ],
        answer: [3]
      },
      {
        text: "Ce tip de atac poate implica folosirea unor instrumente precum nslookup și fping?",
        type: "single",
        options: [
          "Atac de recunoaștere (Reconnaissance attack)",
          "Atac de tip denial of service (DoS)",
          "Atac de tip worm",
          "Atac de acces (Access attack)"
        ],
        answer: [0]
      },
      {
        text: "Ce avantaj oferă SSH față de Telnet pentru administrarea de la distanță a unui router?",
        type: "single",
        options: [
          "Utilizarea TCP",
          "Conexiuni prin mai multe linii VTY",
          "Criptare (Encryption)",
          "Autorizare (Authorization)"
        ],
        answer: [2]
      },
      {
        text: "Care este unul dintre cele mai eficiente instrumente de securitate disponibile pentru protejarea utilizatorilor față de amenințările externe?",
        type: "single",
        options: [
          "Routere care rulează servicii AAA",
          "Servere de patch-uri",
          "Tehnici de criptare a parolelor",
          "Firewall-uri"
        ],
        answer: [3]
      },
      {
        text: "Ce tip de amenințare la adresa rețelei are scopul de a împiedica utilizatorii autorizați să acceseze resursele?",
        type: "single",
        options: [
          "Atacuri de recunoaștere (Reconnaissance attacks)",
          "Atacuri DoS",
          "Atacuri de acces (Access attacks)",
          "Exploatarea încrederii (Trust exploitation)"
        ],
        answer: [1]
      },
      {
        text: "Ce trei servicii sunt furnizate de cadrul AAA? (Alegeți trei.)",
        type: "multi",
        choose: 3,
        options: [
          "Autentificare (Authentication)",
          "Autoconfigurare (Autoconfiguration)",
          "Automatizare (Automation)",
          "Contabilizare (Accounting)",
          "Autorizare (Authorization)",
          "Autoechilibrare (Autobalancing)"
        ],
        answer: [0, 3, 4]
      },
      {
        text: "Ce atac cu cod malițios este autoconținut și încearcă să exploateze o vulnerabilitate specifică a sistemului atacat?",
        type: "single",
        options: [
          "Worm",
          "Cal troian (Trojan horse)",
          "Inginerie socială (Social engineering)",
          "Virus"
        ],
        answer: [0]
      },
      {
        text: "Câteva routere și switch-uri dintr-un dulap de cablare au funcționat defectuos după ce o unitate de aer condiționat s-a defectat. Ce tip de amenințare descrie această situație?",
        type: "single",
        options: [
          "Mentenanță (Maintenance)",
          "Electrică (Electrical)",
          "Configurare (Configuration)",
          "De mediu (Environmental)"
        ],
        answer: [3]
      },
      {
        text: "Ce înseamnă termenul vulnerabilitate (vulnerability)?",
        type: "single",
        options: [
          "Un calculator care conține informații sensibile",
          "O țintă sau mașină victimă cunoscută",
          "O amenințare potențială creată de un hacker",
          "O metodă de atac pentru a exploata o țintă",
          "O slăbiciune care face o țintă susceptibilă la un atac"
        ],
        answer: [4]
      },
      {
        text: "Ce trei pași de configurare trebuie efectuați pentru a implementa accesul SSH la un router? (Alegeți trei.)",
        type: "multi",
        choose: 3,
        options: [
          "O parolă pe linia consolă (console line)",
          "O parolă în modul enable",
          "O parolă criptată",
          "Un cont de utilizator",
          "Un nume de domeniu IP (IP domain name)",
          "Un hostname unic"
        ],
        answer: [3, 4, 5]
      },
      {
        text: "Care este obiectivul unui atac de recunoaștere (reconnaissance attack) în rețea?",
        type: "single",
        options: [
          "Blocarea accesului la resurse pentru utilizatorii legitimi",
          "Manipularea neautorizată a datelor",
          "Dezactivarea sistemelor sau serviciilor de rețea",
          "Descoperirea și cartografierea sistemelor"
        ],
        answer: [3]
      },
      {
        text: "Din motive de securitate, un administrator de rețea trebuie să se asigure că calculatoarele locale nu se pot da ping unele altora. Ce setări pot realiza această sarcină?",
        type: "single",
        options: [
          "Setări ale sistemului de fișiere",
          "Setări ale adresei MAC",
          "Setări de tip smartcard",
          "Setări de firewall"
        ],
        answer: [3]
      },
      {
        text: "Un administrator de rețea stabilește o conexiune la un switch prin SSH. Ce caracteristică descrie în mod unic conexiunea SSH?",
        type: "single",
        options: [
          "Acces de la distanță la un switch unde datele sunt criptate pe durata sesiunii",
          "Acces direct la switch prin utilizarea unui program de emulare de terminal",
          "Acces out-of-band la un switch prin utilizarea unui terminal virtual cu autentificare prin parolă",
          "Acces on-site la un switch prin utilizarea unui PC conectat direct și un cablu de consolă",
          "Acces de la distanță la switch prin utilizarea unei conexiuni telefonice dial-up"
        ],
        answer: [0]
      }
    ];

    const form = document.getElementById('quizForm');

    function renderQuiz() {
      form.innerHTML = '';
      questions.forEach((q, qi) => {
        const card = document.createElement('section');
        card.className = 'quiz-card';
        card.id = `q${qi}`;

        const head = document.createElement('div');
        head.className = 'q-head';
        head.innerHTML = `<span class="badge">Q${qi + 1}</span><strong>Întrebarea ${qi + 1} din ${questions.length}</strong>`;
        card.appendChild(head);

        const question = document.createElement('div');
        question.className = 'question';
        question.textContent = q.text;
        card.appendChild(question);

        if (q.type === 'multi') {
          const note = document.createElement('div');
          note.className = 'multi-note';
          note.textContent = `Alege ${q.choose} răspunsuri.`;
          card.appendChild(note);
        }

        const optionsWrap = document.createElement('div');
        optionsWrap.className = 'options';

        q.options.forEach((opt, oi) => {
          const label = document.createElement('label');
          label.className = 'option';
          label.setAttribute('data-q', qi);
          label.setAttribute('data-o', oi);

          const input = document.createElement('input');
          input.type = q.type === 'single' ? 'radio' : 'checkbox';
          input.name = `q${qi}`;
          input.value = oi;

          const span = document.createElement('span');
          span.textContent = opt;

          label.appendChild(input);
          label.appendChild(span);
          optionsWrap.appendChild(label);
        });

        card.appendChild(optionsWrap);

        const feedback = document.createElement('div');
        feedback.className = 'feedback';
        feedback.id = `feedback-${qi}`;
        card.appendChild(feedback);

        form.appendChild(card);
      });
    }

    function selectedFor(qi) {
      return Array.from(document.querySelectorAll(`input[name="q${qi}"]:checked`)).map(el => Number(el.value)).sort((a, b) => a - b);
    }

    function sameArray(a, b) {
      return a.length === b.length && a.every((v, i) => v === b[i]);
    }

    function checkQuiz() {
      let correctCount = 0;

      questions.forEach((q, qi) => {
        const selected = selectedFor(qi);
        const answer = [...q.answer].sort((a, b) => a - b);
        const isCorrect = sameArray(selected, answer);
        if (isCorrect) correctCount++;

        document.querySelectorAll(`label[data-q="${qi}"]`).forEach(label => {
          label.classList.remove('correct-highlight', 'wrong-highlight');
          const oi = Number(label.getAttribute('data-o'));
          if (answer.includes(oi)) label.classList.add('correct-highlight');
          if (selected.includes(oi) && !answer.includes(oi)) label.classList.add('wrong-highlight');
        });

        const feedback = document.getElementById(`feedback-${qi}`);
        const correctText = answer.map(i => q.options[i]).join(' / ');
        feedback.className = `feedback ${isCorrect ? 'ok' : 'bad'}`;
        feedback.innerHTML = isCorrect
          ? 'Corect!'
          : `Incorect.<div class="correct-answer">Răspuns corect: ${correctText}</div>`;
      });

      const percent = Math.round((correctCount / questions.length) * 100);
      document.getElementById('scoreBox').textContent = `Scor: ${correctCount}/${questions.length} (${percent}%)`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetQuiz() {
      document.querySelectorAll('input').forEach(input => input.checked = false);
      document.querySelectorAll('.feedback').forEach(fb => {
        fb.className = 'feedback';
        fb.innerHTML = '';
      });
      document.querySelectorAll('label.option').forEach(label => {
        label.classList.remove('correct-highlight', 'wrong-highlight');
      });
      document.getElementById('scoreBox').textContent = 'Scor: neverificat';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderQuiz();
  </script>
</body>
</html>
