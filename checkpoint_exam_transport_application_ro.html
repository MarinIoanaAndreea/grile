<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkpoint Exam - Stratul Transport si Aplicatie</title>
  <style>
    :root {
      --bg: #f4f7fb; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
      --accent: #0ea5e9; --accent-dark: #0284c7; --ok: #16a34a; --bad: #dc2626;
      --border: #dbe3ef; --soft: #eef6ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(180deg, #eef6ff 0%, var(--bg) 240px); color: var(--text); line-height: 1.5; }
    header { max-width: 1050px; margin: 0 auto; padding: 34px 18px 18px; }
    h1 { margin: 0 0 8px; font-size: clamp(26px, 4vw, 40px); }
    .subtitle { color: var(--muted); margin: 0; max-width: 780px; }
    main { max-width: 1050px; margin: 0 auto; padding: 12px 18px 50px; }
    .toolbar { position: sticky; top: 0; z-index: 20; background: rgba(244,247,251,0.92); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 16px; padding: 14px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between; margin: 0 0 18px; box-shadow: 0 10px 24px rgba(15,23,42,0.06); }
    .toolbar .score { font-weight: 700; color: var(--text); }
    button { border: 0; border-radius: 12px; padding: 11px 16px; font-weight: 700; cursor: pointer; transition: transform .08s ease, background .2s ease; }
    button:hover { transform: translateY(-1px); }
    .primary { background: var(--accent); color: white; }
    .primary:hover { background: var(--accent-dark); }
    .secondary { background: #e5e7eb; color: #111827; }
    .quiz-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin: 18px 0; box-shadow: 0 10px 28px rgba(15,23,42,0.05); }
    .q-head { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
    .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 42px; height: 32px; padding: 0 10px; border-radius: 999px; background: var(--soft); color: var(--accent-dark); font-weight: 800; }
    .multi-note { color: var(--muted); font-size: 14px; margin-top: 6px; }
    .question { font-size: 18px; font-weight: 700; margin: 8px 0 14px; }
    .options { display: grid; gap: 10px; margin-top: 12px; }
    label.option { display: grid; grid-template-columns: 26px 1fr; gap: 12px; align-items: start; padding: 13px 14px; border: 1px solid var(--border); border-radius: 12px; background: #fff; cursor: pointer; }
    label.option:hover { background: #f8fafc; }
    input { margin-top: 4px; transform: scale(1.15); }
    .feedback { display: none; margin-top: 15px; padding: 13px 14px; border-radius: 12px; font-weight: 700; }
    .feedback.ok { display: block; background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .feedback.bad { display: block; background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
    .correct-answer { margin-top: 8px; font-weight: 400; }
    .correct-highlight { border-color: #86efac !important; background: #f0fdf4 !important; }
    .wrong-highlight { border-color: #fca5a5 !important; background: #fff1f2 !important; }
    footer { color: var(--muted); text-align: center; font-size: 13px; padding: 12px 0 34px; }
  </style>
</head>
<body>
  <header>
    <h1>Checkpoint Exam - Stratul Transport si Aplicatie</h1>
    <p class="subtitle">Quiz interactiv cu 32 de intrebari. Bifeaza raspunsul/raspunsurile, apoi apasa Verifica raspunsurile.</p>
  </header>
  <main>
    <section class="toolbar">
      <div class="score" id="scoreBox">Scor: neverificat</div>
      <div>
        <button class="primary" onclick="checkQuiz()">Verifica raspunsurile</button>
        <button class="secondary" onclick="resetQuiz()">Reseteaza</button>
      </div>
    </section>
    <form id="quizForm"></form>
  </main>
  <footer>Fisier HTML generat pentru exersare individuala.</footer>

  <script>
    const questions = [
      {
        text: "Care doua caracteristici sunt asociate sesiunilor UDP? (Alege doua.)",
        type: "multi", choose: 2,
        options: [
          "Segmentele de date transmise sunt urmarite.",
          "Dispozitivele destinatie reasambleaza mesajele si le trimit aplicatiei.",
          "Pachetele neconfirmate sunt retransmise.",
          "Dispozitivele destinatie primesc traficul cu intarziere minima.",
          "Datele primite nu sunt confirmate (unacknowledged)."
        ],
        answer: [3, 4]
      },
      {
        text: "Care sunt doua roluri ale stratului transport in comunicarea de date? (Alege doua.)",
        type: "multi", choose: 2,
        options: [
          "Identificarea aplicatiei potrivite pentru fiecare flux de comunicare",
          "Furnizarea interfetei intre aplicatii si reteaua de baza prin care sunt transmise mesajele",
          "Urmarirea comunicarilor individuale intre aplicatii pe hosturile sursa si destinatie",
          "Efectuarea unui control CRC (cyclic redundancy check) pe cadru pentru erori",
          "Furnizarea delimitarii cadrelor pentru identificarea bitilor care alcatuiesc un cadru"
        ],
        answer: [0, 2]
      },
      {
        text: "Care trei afirmatii caracterizeaza UDP? (Alege trei.)",
        type: "multi", choose: 3,
        options: [
          "UDP se bazeaza pe protocoalele stratului aplicatie pentru detectarea erorilor.",
          "UDP ofera mecanisme sofisticate de control al fluxului.",
          "UDP ofera transport orientat pe conexiune si rapid al datelor la Layer 3.",
          "UDP ofera functii de baza de transport fara conexiune (connectionless).",
          "UDP este un protocol cu overhead redus, fara mecanisme de secventiere sau control al fluxului.",
          "UDP se bazeaza pe IP pentru detectarea si recuperarea erorilor."
        ],
        answer: [0, 3, 4]
      },
      {
        text: "Ce factor determina dimensiunea ferestrei TCP (TCP window size)?",
        type: "single",
        options: [
          "Cantitatea de date pe care destinatia o poate procesa la un moment dat",
          "Numarul de servicii incluse in segmentul TCP",
          "Cantitatea de date pe care sursa este capabila sa o trimita la un moment dat",
          "Cantitatea de date care urmeaza sa fie transmisa"
        ],
        answer: [0]
      },
      {
        text: "Ce informatii foloseste TCP pentru a reasambla si reordona segmentele primite?",
        type: "single",
        options: [
          "Numere de secventa (Sequence numbers)",
          "Numere de confirmare (Acknowledgment numbers)",
          "Numere de port",
          "Numere de fragment"
        ],
        answer: [0]
      },
      {
        text: "Care trei campuri sunt folosite in header-ul unui segment UDP? (Alege trei.)",
        type: "multi", choose: 3,
        options: [
          "Window Size (Dimensiunea ferestrei)",
          "Acknowledgment Number (Numarul de confirmare)",
          "Source Port (Port sursa)",
          "Sequence Number (Numarul de secventa)",
          "Checksum",
          "Length (Lungime)"
        ],
        answer: [2, 4, 5]
      },
      {
        text: "Care trei protocoale de nivel aplicatie folosesc TCP? (Alege trei.)",
        type: "multi", choose: 3,
        options: ["SMTP", "SNMP", "FTP", "DHCP", "TFTP", "HTTP"],
        answer: [0, 2, 5]
      },
      {
        text: "Cum sunt folosite numerele de port in procesul de incapsulare TCP/IP?",
        type: "single",
        options: [
          "Numerele de port sursa si destinatie nu sunt necesare cand UDP este protocolul de transport folosit.",
          "Numerele de port sursa si destinatie sunt generate aleator.",
          "Numerele de port destinatie sunt atribuite automat si nu pot fi schimbate.",
          "Daca au loc mai multe conversatii care folosesc acelasi serviciu, numarul de port sursa este folosit pentru a urmari conversatiile separate."
        ],
        answer: [3]
      },
      {
        text: "Ce protocol sau serviciu foloseste UDP pentru comunicarea client-server si TCP pentru comunicarea server-server?",
        type: "single",
        options: ["SMTP", "HTTP", "FTP", "DNS"],
        answer: [3]
      },
      {
        text: "Ce informatii importante sunt adaugate in header-ul stratului transport TCP/IP pentru a asigura comunicarea cu un dispozitiv de retea la distanta?",
        type: "single",
        options: [
          "Adrese fizice sursa si destinatie",
          "Sincronizare temporala",
          "Adrese logice de retea sursa si destinatie",
          "Numere de port sursa si destinatie"
        ],
        answer: [3]
      },
      {
        text: "Ce tip de port trebuie solicitat de la IANA pentru a fi folosit cu o aplicatie specifica?",
        type: "single",
        options: [
          "Port privat",
          "Port inregistrat (Registered port)",
          "Port dinamic",
          "Port sursa"
        ],
        answer: [1]
      },
      {
        text: "De ce foloseste HTTP protocolul TCP ca protocol de transport?",
        type: "single",
        options: [
          "Deoarece HTTP necesita livrare fiabila",
          "Deoarece HTTP este un protocol best-effort",
          "Pentru a asigura cea mai rapida viteza de descarcare posibila",
          "Deoarece erorile de transmisie pot fi tolerate cu usurinta"
        ],
        answer: [0]
      },
      {
        text: "Care doua tipuri de aplicatii sunt cel mai potrivite pentru UDP? (Alege doua.)",
        type: "multi", choose: 2,
        options: [
          "Aplicatii care gestioneaza ele insele fiabilitatea",
          "Aplicatii care au nevoie de reordonarea segmentelor",
          "Aplicatii care au nevoie de controlul fluxului de date",
          "Aplicatii care pot tolera pierderea unor date, dar necesita intarziere minima sau zero",
          "Aplicatii care necesita livrare fiabila"
        ],
        answer: [0, 3]
      },
      {
        text: "Care este o caracteristica a UDP?",
        type: "single",
        options: [
          "UDP trimite date catre retea doar cand destinatia este pregatita sa le primeasca.",
          "Datagramele UDP iau aceeasi cale si ajung in ordinea corecta la destinatie.",
          "Aplicatiile care folosesc UDP sunt intotdeauna considerate nesigure.",
          "UDP reasambleaza datagramele primite in ordinea in care au fost primite."
        ],
        answer: [3]
      },
      {
        text: "Ce protocol este folosit de un client pentru a comunica in siguranta cu un server web?",
        type: "single",
        options: ["SMB", "IMAP", "HTTPS", "SMTP"],
        answer: [2]
      },
      {
        text: "Care este un exemplu de comunicare de retea care foloseste modelul client-server?",
        type: "single",
        options: [
          "Un utilizator tipareste un document folosind o imprimanta atasata la statia de lucru a unui coleg.",
          "O statie de lucru initiaza o cerere DNS cand utilizatorul tasteaza www.cisco.com in bara de adrese a browserului.",
          "Un utilizator foloseste eMule pentru a descarca un fisier partajat de un prieten dupa ce locatia fisierului este determinata.",
          "O statie de lucru initiaza un ARP pentru a gasi adresa MAC a unui host receptor."
        ],
        answer: [1]
      },
      {
        text: "Care trei protocoale opereaza la stratul aplicatie al modelului TCP/IP? (Alege trei.)",
        type: "multi", choose: 3,
        options: ["ARP", "UDP", "TCP", "DHCP", "POP3", "FTP"],
        answer: [3, 4, 5]
      },
      {
        text: "Care aplicatii sau servicii permit hosturilor sa actioneze ca client si server in acelasi timp?",
        type: "single",
        options: [
          "Aplicatii de email",
          "Aplicatii client/server",
          "Servicii de autentificare",
          "Aplicatii P2P (peer-to-peer)"
        ],
        answer: [3]
      },
      {
        text: "Ce strat din modelul TCP/IP este folosit pentru formatarea, comprimarea si criptarea datelor?",
        type: "single",
        options: [
          "Prezentare (Presentation)",
          "Aplicatie (Application)",
          "Sesiune (Session)",
          "Acces la retea (Network access)",
          "Internetwork"
        ],
        answer: [1]
      },
      {
        text: "Ce protocol de nivel aplicatie foloseste tipuri de mesaje precum GET, PUT si POST?",
        type: "single",
        options: ["HTTP", "POP3", "DHCP", "SMTP", "DNS"],
        answer: [0]
      },
      {
        text: "Care este un avantaj al SMB fata de FTP?",
        type: "single",
        options: [
          "Clientii SMB pot stabili o conexiune pe termen lung cu serverul.",
          "SMB este mai fiabil decat FTP deoarece SMB foloseste TCP iar FTP foloseste UDP.",
          "Doar SMB stabileste doua conexiuni simultane cu clientul, accelerand transferul.",
          "Doar cu SMB transferurile de date pot avea loc in ambele directii."
        ],
        answer: [0]
      },
      {
        text: "Ce protocol comun este folosit cu aplicatii peer-to-peer precum WireShare, Bearshare si Shareaza?",
        type: "single",
        options: ["Gnutella", "SMTP", "Ethernet", "POP"],
        answer: [0]
      },
      {
        text: "Care doua protocoale pot fi folosite de dispozitive in procesul de trimitere a emailurilor? (Alege doua.)",
        type: "multi", choose: 2,
        options: ["POP", "HTTP", "DNS", "POP3", "IMAP", "SMTP"],
        answer: [2, 5]
      },
      {
        text: "Ce au in comun modelele de retea client/server si peer-to-peer?",
        type: "single",
        options: [
          "Ambele modele suporta dispozitive in roluri de server si client.",
          "Ambele modele sunt folosite doar in mediul de retea prin cablu.",
          "Ambele modele necesita utilizarea protocoalelor bazate pe TCP/IP.",
          "Ambele modele au servere dedicate."
        ],
        answer: [0]
      },
      {
        text: "Care trei afirmatii descriu un mesaj DHCP Discover? (Alege trei.)",
        type: "multi", choose: 3,
        options: [
          "Doar serverul DHCP primeste mesajul.",
          "Adresa IP destinatie este 255.255.255.255.",
          "Toate hosturile primesc mesajul, dar doar un server DHCP raspunde.",
          "Mesajul vine de la un server care ofera o adresa IP.",
          "Mesajul vine de la un client care cauta o adresa IP.",
          "Adresa MAC sursa este 48 de unu (FF-FF-FF-FF-FF-FF)."
        ],
        answer: [1, 2, 4]
      },
      {
        text: "Ce strat OSI ofera interfata intre aplicatiile folosite pentru comunicare si reteaua de baza prin care sunt transmise mesajele?",
        type: "single",
        options: [
          "Transport",
          "Sesiune (Session)",
          "Aplicatie (Application)",
          "Prezentare (Presentation)"
        ],
        answer: [2]
      },
      {
        text: "Ce model de retea este folosit cand un autor incarca un document de capitol pe serverul de fisiere al unui editor de carte?",
        type: "single",
        options: [
          "Peer-to-peer",
          "Master-slave",
          "Point-to-point",
          "Client/server"
        ],
        answer: [3]
      },
      {
        text: "Stratul aplicatie al modelului TCP/IP indeplineste functiile a ce trei straturi ale modelului OSI? (Alege trei.)",
        type: "multi", choose: 3,
        options: [
          "Aplicatie (Application)",
          "Prezentare (Presentation)",
          "Legatura de date (Data link)",
          "Fizic (Physical)",
          "Transport",
          "Sesiune (Session)",
          "Retea (Network)"
        ],
        answer: [0, 1, 5]
      },
      {
        text: "Care trei straturi ale modelului OSI ofera servicii similare celor oferite de stratul aplicatie al modelului TCP/IP? (Alege trei.)",
        type: "multi", choose: 3,
        options: [
          "Stratul Fizic (Physical layer)",
          "Stratul Aplicatie (Application layer)",
          "Stratul Legatura de date (Data link layer)",
          "Stratul Sesiune (Session layer)",
          "Stratul Transport",
          "Stratul Prezentare (Presentation layer)"
        ],
        answer: [1, 3, 5]
      },
      {
        text: "Care scenariu descrie o functie oferita de stratul transport?",
        type: "single",
        options: [
          "Un student urmareste un film web scurt cu sunet. Filmul si sunetul sunt codificate in header-ul stratului transport.",
          "Un angajat acceseaza un server web din reteaua corporativa. Stratul transport formateaza ecranul pentru ca pagina web sa apara corect pe orice dispozitiv.",
          "Un student foloseste un telefon VoIP din clasa pentru a suna acasa. Identificatorul unic inscris in telefon este o adresa de strat transport folosita pentru a contacta alt dispozitiv din aceeasi retea.",
          "Un student are doua ferestre de browser deschise pentru a accesa doua site-uri web. Stratul transport asigura ca pagina web corecta este livrata la fereastra de browser corecta."
        ],
        answer: [3]
      },
      {
        text: "Un PC care comunica cu un server web are o dimensiune a ferestrei TCP de 6.000 bytes la trimiterea datelor si un pachet de 1.500 bytes. Ce octet de informatie va confirma serverul web dupa ce a primit doua pachete de date de la PC?",
        type: "single",
        options: ["3000", "3001", "4500", "6001"],
        answer: [1]
      },
      {
        text: "Un client creeaza un pachet pentru a-l trimite unui server. Clientul solicita serviciul SNMP. Ce numar va fi folosit ca numar de port destinatie in pachetul trimis?",
        type: "single",
        options: ["161", "80", "110", "443"],
        answer: [0]
      }
    ];

    const form = document.getElementById('quizForm');

    function renderQuiz() {
      form.innerHTML = '';
      questions.forEach((q, qi) => {
        const card = document.createElement('section');
        card.className = 'quiz-card';
        card.id = 'q' + qi;
        const head = document.createElement('div');
        head.className = 'q-head';
        head.innerHTML = '<span class="badge">Q' + (qi+1) + '</span><strong>Intrebarea ' + (qi+1) + ' din ' + questions.length + '</strong>';
        card.appendChild(head);
        const question = document.createElement('div');
        question.className = 'question';
        question.textContent = q.text;
        card.appendChild(question);
        if (q.type === 'multi') {
          const note = document.createElement('div');
          note.className = 'multi-note';
          note.textContent = 'Alege ' + q.choose + ' raspunsuri.';
          card.appendChild(note);
        }
        const optionsWrap = document.createElement('div');
        optionsWrap.className = 'options';
        q.options.forEach((opt, oi) => {
          const label = document.createElement('label');
          label.className = 'option';
          label.setAttribute('data-q', qi);
          label.setAttribute('data-o', oi);
          const input = document.createElement('input');
          input.type = q.type === 'single' ? 'radio' : 'checkbox';
          input.name = 'q' + qi;
          input.value = oi;
          const span = document.createElement('span');
          span.textContent = opt;
          label.appendChild(input);
          label.appendChild(span);
          optionsWrap.appendChild(label);
        });
        card.appendChild(optionsWrap);
        const feedback = document.createElement('div');
        feedback.className = 'feedback';
        feedback.id = 'feedback-' + qi;
        card.appendChild(feedback);
        form.appendChild(card);
      });
    }

    function selectedFor(qi) {
      return Array.from(document.querySelectorAll('input[name="q' + qi + '"]:checked')).map(el => Number(el.value)).sort((a,b) => a-b);
    }

    function sameArray(a, b) {
      return a.length === b.length && a.every((v, i) => v === b[i]);
    }

    function checkQuiz() {
      let correctCount = 0;
      questions.forEach((q, qi) => {
        const selected = selectedFor(qi);
        const answer = [...q.answer].sort((a,b) => a-b);
        const isCorrect = sameArray(selected, answer);
        if (isCorrect) correctCount++;
        document.querySelectorAll('label[data-q="' + qi + '"]').forEach(label => {
          label.classList.remove('correct-highlight', 'wrong-highlight');
          const oi = Number(label.getAttribute('data-o'));
          if (answer.includes(oi)) label.classList.add('correct-highlight');
          if (selected.includes(oi) && !answer.includes(oi)) label.classList.add('wrong-highlight');
        });
        const feedback = document.getElementById('feedback-' + qi);
        const correctText = answer.map(i => q.options[i]).join(' / ');
        feedback.className = 'feedback ' + (isCorrect ? 'ok' : 'bad');
        feedback.innerHTML = isCorrect
          ? 'Corect!'
          : 'Incorect.<div class="correct-answer">Raspuns corect: ' + correctText + '</div>';
      });
      const percent = Math.round((correctCount / questions.length) * 100);
      document.getElementById('scoreBox').textContent = 'Scor: ' + correctCount + '/' + questions.length + ' (' + percent + '%)';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetQuiz() {
      document.querySelectorAll('input').forEach(input => input.checked = false);
      document.querySelectorAll('.feedback').forEach(fb => { fb.className = 'feedback'; fb.innerHTML = ''; });
      document.querySelectorAll('label.option').forEach(label => { label.classList.remove('correct-highlight', 'wrong-highlight'); });
      document.getElementById('scoreBox').textContent = 'Scor: neverificat';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderQuiz();
  </script>
</body>
</html>
