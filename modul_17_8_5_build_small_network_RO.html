<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>17.8.5 Module Quiz - Build a Small Network</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0ea5e9;
      --accent-dark: #0284c7;
      --ok: #16a34a;
      --bad: #dc2626;
      --border: #dbe3ef;
      --soft: #eef6ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef6ff 0%, var(--bg) 240px);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      max-width: 1050px;
      margin: 0 auto;
      padding: 34px 18px 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 40px);
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      max-width: 780px;
    }

    main {
      max-width: 1050px;
      margin: 0 auto;
      padding: 12px 18px 50px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244, 247, 251, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 18px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    .toolbar .score {
      font-weight: 700;
      color: var(--text);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .08s ease, background .2s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .primary {
      background: var(--accent);
      color: white;
    }

    .primary:hover { background: var(--accent-dark); }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .quiz-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      margin: 18px 0;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
    }

    .q-head {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 32px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--accent-dark);
      font-weight: 800;
    }

    .multi-note {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .question {
      font-size: 18px;
      font-weight: 700;
      margin: 8px 0 14px;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    label.option {
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 12px;
      align-items: start;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
    }

    label.option:hover { background: #f8fafc; }
    input { margin-top: 4px; transform: scale(1.15); }

    .feedback {
      display: none;
      margin-top: 15px;
      padding: 13px 14px;
      border-radius: 12px;
      font-weight: 700;
    }

    .feedback.ok {
      display: block;
      background: #dcfce7;
      color: #14532d;
      border: 1px solid #86efac;
    }

    .feedback.bad {
      display: block;
      background: #fee2e2;
      color: #7f1d1d;
      border: 1px solid #fca5a5;
    }

    .correct-answer {
      margin-top: 8px;
      font-weight: 400;
    }

    .correct-highlight {
      border-color: #86efac !important;
      background: #f0fdf4 !important;
    }

    .wrong-highlight {
      border-color: #fca5a5 !important;
      background: #fff1f2 !important;
    }

    footer {
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      padding: 12px 0 34px;
    }
  </style>
</head>
<body>
  <header>
    <h1>17.8.5 Module Quiz - Build a Small Network</h1>
    <p class="subtitle">Quiz interactiv cu 15 întrebări. Bifează răspunsul/răspunsurile, apoi apasă „Verifică răspunsurile".</p>
  </header>

  <main>
    <section class="toolbar">
      <div class="score" id="scoreBox">Scor: neverificat</div>
      <div>
        <button class="primary" onclick="checkQuiz()">Verifică răspunsurile</button>
        <button class="secondary" onclick="resetQuiz()">Resetează</button>
      </div>
    </section>

    <form id="quizForm"></form>
  </main>

  <footer>
    Fișier HTML generat pentru exersare individuală.
  </footer>

  <script>
    const questions = [
      {
        text: "Ce considerație de proiectare a rețelei ar fi mai importantă pentru o corporație mare decât pentru o afacere mică?",
        type: "single",
        options: [
          "Switch cu densitate mică de porturi",
          "Firewall",
          "Redundanță (Redundancy)",
          "Router de internet"
        ],
        answer: [2]
      },
      {
        text: "Un tehnician de rețea nou angajat primește sarcina de a comanda hardware nou pentru o afacere mică cu o prognoză mare de creștere. Care factor principal ar trebui să preocupe tehnicianul la alegerea noilor dispozitive?",
        type: "single",
        options: [
          "Dispozitive redundante",
          "Dispozitive cu suport pentru modularitate",
          "Dispozitive cu suport pentru monitorizarea rețelei",
          "Dispozitive cu număr fix de interfețe"
        ],
        answer: [1]
      },
      {
        text: "Ce tip de trafic ar avea cel mai probabil prioritatea cea mai mare în rețea?",
        type: "single",
        options: [
          "SNMP",
          "Mesagerie instantanee (Instant messaging)",
          "FTP",
          "Voce (Voice)"
        ],
        answer: [3]
      },
      {
        text: "Un tehnician de rețea investighează conectivitatea rețelei de pe un PC la o gazdă de la distanță cu adresa 10.1.1.5. Ce comandă, emisă pe un PC cu Windows, va afișa calea către gazda de la distanță?",
        type: "single",
        options: [
          "ping 10.1.1.5",
          "traceroute 10.1.1.5",
          "tracert 10.1.1.5",
          "trace 10.1.1.5"
        ],
        answer: [2]
      },
      {
        text: "Un utilizator nu poate accesa site-ul web când tastează http://www.cisco.com într-un browser web, dar poate accesa același site tastând http://72.163.4.161. Care este problema?",
        type: "single",
        options: [
          "Stiva de protocoale TCP/IP",
          "DNS",
          "Gateway implicit (Default gateway)",
          "DHCP"
        ],
        answer: [1]
      },
      {
        text: "Unde sunt trimise implicit mesajele de depanare (debug) Cisco IOS?",
        type: "single",
        options: [
          "Server syslog",
          "Buffere de memorie",
          "Linii VTY",
          "Linia consolă (Console line)"
        ],
        answer: [3]
      },
      {
        text: "Ce element al scalării unei rețele implică identificarea topologiilor fizice și logice?",
        type: "single",
        options: [
          "Analiza costurilor",
          "Inventarul dispozitivelor",
          "Analiza traficului",
          "Documentarea rețelei (Network documentation)"
        ],
        answer: [3]
      },
      {
        text: "Ce mecanism poate fi implementat într-o rețea mică pentru a minimiza latența rețelei pentru aplicațiile de streaming în timp real?",
        type: "single",
        options: [
          "PoE",
          "AAA",
          "QoS",
          "ICMP"
        ],
        answer: [2]
      },
      {
        text: "Ce proces a eșuat dacă un calculator nu poate accesa internetul și a primit adresa IP 169.254.142.5?",
        type: "single",
        options: [
          "DHCP",
          "DNS",
          "HTTP",
          "IP"
        ],
        answer: [0]
      },
      {
        text: "O companie mică are un singur router ca punct de ieșire către ISP-ul său. Ce soluție ar putea fi adoptată pentru a menține conectivitatea dacă routerul sau conexiunea sa la ISP se defectează?",
        type: "single",
        options: [
          "Adăugarea mai multor interfețe routerului conectat la rețeaua internă.",
          "Activarea unei alte interfețe de router conectată la ISP, astfel încât traficul să poată circula prin ea.",
          "Utilizarea unui al doilea router conectat la un alt ISP.",
          "Achiziționarea unui al doilea link cu cost minim de la un alt ISP pentru a se conecta la acest router."
        ],
        answer: [2]
      },
      {
        text: "Când ar trebui un administrator să stabilească o linie de bază (baseline) a rețelei?",
        type: "single",
        options: [
          "La cel mai scăzut nivel de trafic din rețea",
          "La intervale regulate de-a lungul unei perioade de timp",
          "Când traficul este la vârf în rețea",
          "Când există o scădere bruscă a traficului"
        ],
        answer: [1]
      },
      {
        text: "Care două tipuri de trafic necesită livrare sensibilă la întârziere? (Alegeți două.)",
        type: "multi",
        choose: 2,
        options: [
          "Video",
          "Web",
          "Voce (Voice)",
          "E-mail",
          "FTP"
        ],
        answer: [0, 2]
      },
      {
        text: "Un tehnician de rețea suspectează o nepotrivire duplex (duplex mismatch) la o conexiune de rețea între două switch-uri Cisco. Ce comandă ar folosi tehnicianul pentru a vedea detaliile Layer 1 și Layer 2 ale unui port de switch?",
        type: "single",
        options: [
          "show ip interface brief",
          "show running-config",
          "show mac-address-table",
          "show interfaces"
        ],
        answer: [3]
      },
      {
        text: "Care afirmație este adevărată despre CDP pe un dispozitiv Cisco?",
        type: "single",
        options: [
          "CDP poate fi dezactivat global sau pe o interfață specifică.",
          "Deoarece rulează la nivelul data link, protocolul CDP poate fi implementat doar în switch-uri.",
          "Pentru a dezactiva CDP global, trebuie folosită comanda no cdp enable în modul de configurare al interfeței.",
          "Comanda show cdp neighbor detail va dezvălui adresa IP a unui vecin doar dacă există conectivitate Layer 3."
        ],
        answer: [0]
      },
      {
        text: "Ce factor ar trebui luat în considerare în proiectarea unei rețele mici atunci când se aleg dispozitivele?",
        type: "single",
        options: [
          "Redundanță",
          "Costul dispozitivelor",
          "Analiza traficului",
          "ISP"
        ],
        answer: [1]
      }
    ];

    const form = document.getElementById('quizForm');

    function renderQuiz() {
      form.innerHTML = '';
      questions.forEach((q, qi) => {
        const card = document.createElement('section');
        card.className = 'quiz-card';
        card.id = `q${qi}`;

        const head = document.createElement('div');
        head.className = 'q-head';
        head.innerHTML = `<span class="badge">Q${qi + 1}</span><strong>Întrebarea ${qi + 1} din ${questions.length}</strong>`;
        card.appendChild(head);

        const question = document.createElement('div');
        question.className = 'question';
        question.textContent = q.text;
        card.appendChild(question);

        if (q.type === 'multi') {
          const note = document.createElement('div');
          note.className = 'multi-note';
          note.textContent = `Alege ${q.choose} răspunsuri.`;
          card.appendChild(note);
        }

        const optionsWrap = document.createElement('div');
        optionsWrap.className = 'options';

        q.options.forEach((opt, oi) => {
          const label = document.createElement('label');
          label.className = 'option';
          label.setAttribute('data-q', qi);
          label.setAttribute('data-o', oi);

          const input = document.createElement('input');
          input.type = q.type === 'single' ? 'radio' : 'checkbox';
          input.name = `q${qi}`;
          input.value = oi;

          const span = document.createElement('span');
          span.textContent = opt;

          label.appendChild(input);
          label.appendChild(span);
          optionsWrap.appendChild(label);
        });

        card.appendChild(optionsWrap);

        const feedback = document.createElement('div');
        feedback.className = 'feedback';
        feedback.id = `feedback-${qi}`;
        card.appendChild(feedback);

        form.appendChild(card);
      });
    }

    function selectedFor(qi) {
      return Array.from(document.querySelectorAll(`input[name="q${qi}"]:checked`)).map(el => Number(el.value)).sort((a, b) => a - b);
    }

    function sameArray(a, b) {
      return a.length === b.length && a.every((v, i) => v === b[i]);
    }

    function checkQuiz() {
      let correctCount = 0;

      questions.forEach((q, qi) => {
        const selected = selectedFor(qi);
        const answer = [...q.answer].sort((a, b) => a - b);
        const isCorrect = sameArray(selected, answer);
        if (isCorrect) correctCount++;

        document.querySelectorAll(`label[data-q="${qi}"]`).forEach(label => {
          label.classList.remove('correct-highlight', 'wrong-highlight');
          const oi = Number(label.getAttribute('data-o'));
          if (answer.includes(oi)) label.classList.add('correct-highlight');
          if (selected.includes(oi) && !answer.includes(oi)) label.classList.add('wrong-highlight');
        });

        const feedback = document.getElementById(`feedback-${qi}`);
        const correctText = answer.map(i => q.options[i]).join(' / ');
        feedback.className = `feedback ${isCorrect ? 'ok' : 'bad'}`;
        feedback.innerHTML = isCorrect
          ? 'Corect!'
          : `Incorect.<div class="correct-answer">Răspuns corect: ${correctText}</div>`;
      });

      const percent = Math.round((correctCount / questions.length) * 100);
      document.getElementById('scoreBox').textContent = `Scor: ${correctCount}/${questions.length} (${percent}%)`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetQuiz() {
      document.querySelectorAll('input').forEach(input => input.checked = false);
      document.querySelectorAll('.feedback').forEach(fb => {
        fb.className = 'feedback';
        fb.innerHTML = '';
      });
      document.querySelectorAll('label.option').forEach(label => {
        label.classList.remove('correct-highlight', 'wrong-highlight');
      });
      document.getElementById('scoreBox').textContent = 'Scor: neverificat';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderQuiz();
  </script>
</body>
</html>
