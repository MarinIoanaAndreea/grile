<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grile Cisco Modul 4 - Stratul Fizic (Physical Layer)</title>
<style>
  :root { --blue:#0ea5c6; --green:#198754; --red:#dc3545; --bg:#f4f7fb; --card:#fff; --muted:#667085; }
  body { font-family: Arial, Helvetica, sans-serif; background: var(--bg); color:#111827; margin:0; padding:24px; }
  .wrap { max-width: 1050px; margin:0 auto; }
  h1 { margin:0 0 8px; }
  .intro { color:var(--muted); margin-bottom:22px; line-height:1.5; }
  .toolbar { position:sticky; top:0; z-index:10; background:rgba(244,247,251,.95); border-bottom:1px solid #e5e7eb; padding:12px 0; margin-bottom:18px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  button { border:0; border-radius:10px; padding:10px 14px; font-weight:700; cursor:pointer; }
  .btn-primary { background:var(--blue); color:#fff; }
  .btn-secondary { background:#e5e7eb; color:#111827; }
  .score { font-weight:700; margin-left:auto; }
  .question { background:var(--card); border-radius:16px; padding:22px; margin-bottom:18px; box-shadow:0 8px 24px rgba(15,23,42,.08); border:1px solid #e5e7eb; }
  .q-head { display:flex; gap:10px; align-items:center; margin-bottom:12px; }
  .q-num { background:#d1fae5; color:#065f46; padding:6px 10px; border-radius:999px; font-weight:700; }
  .q-text { font-size:18px; line-height:1.45; margin:10px 0 16px; }
  label.option { display:block; background:#f3f4f6; border:2px solid transparent; border-radius:12px; padding:13px 14px; margin:10px 0; cursor:pointer; line-height:1.35; }
  label.option:hover { border-color:#bde7ef; }
  input[type="radio"] { margin-right:10px; transform:scale(1.15); }
  .actions { display:flex; gap:10px; align-items:center; margin-top:12px; flex-wrap:wrap; }
  .feedback { margin-top:14px; padding:14px 16px; border-radius:12px; display:none; line-height:1.5; }
  .feedback.ok { display:block; background:#ecfdf3; border:1px solid #86efac; }
  .feedback.bad { display:block; background:#fff1f2; border:1px solid #fda4af; }
  .explanation { margin-top:10px; padding:14px 16px; background:#f8fafc; border-left:5px solid var(--blue); border-radius:10px; color:#1f2937; }
  .correct-label { border-color:#22c55e !important; background:#ecfdf3 !important; }
  .wrong-label { border-color:#ef4444 !important; background:#fff1f2 !important; }
  .small { color:var(--muted); font-size:14px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Grile Cisco Modul 4 - Stratul Fizic (Physical Layer)</h1>
  <p class="intro">Alege răspunsul pentru fiecare întrebare, apoi apasă <strong>Verifică întrebarea</strong>. La final poți calcula scorul total.</p>
  <div class="toolbar">
    <button class="btn-primary" onclick="checkAll()">Verifică toate</button>
    <button class="btn-secondary" onclick="resetQuiz()">Resetează</button>
    <span class="score" id="scoreBox">Scor: - / 15</span>
  </div>
  <div id="quiz"></div>
</div>
<script>
function esc(s) {
  return s.replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}

const questions = [
  {
    q: "Un administrator de rețea depanează probleme de conectivitate pe un server. Folosind un tester, administratorul observă că semnalele generate de placa de rețea (NIC) a serverului sunt distorsionate și inutilizabile. În ce strat al modelului OSI este clasificată eroarea?",
    options: ["Stratul Prezentare (Presentation layer)", "Stratul Rețea (Network layer)", "Stratul Fizic (Physical layer)", "Stratul Legătură de date (Data link layer)"],
    answer: 2,
    expl: "NIC-ul are responsabilități atât la Layer 1 cât și la Layer 2. NIC-ul codifică cadrul ca o serie de semnale transmise pe mediul local. Aceasta este responsabilitatea stratului fizic al modelului OSI. Semnalul poate fi electric, optic sau unde radio."
  },
  {
    q: "Ce tip de cablu este folosit pentru a conecta portul serial al unui workstation la portul de consolă al unui router Cisco?",
    options: ["Coaxial", "Straight-through", "Rollover", "Crossover"],
    answer: 2,
    expl: "Perechile de fire UTP pot fi terminate în diferite configurații. Pentru a conecta un PC la portul de consolă al unui router Cisco, trebuie utilizat un cablu rollover (cablu de consolă)."
  },
  {
    q: "De ce se folosesc două fire de fibră optică pentru o singură conexiune de fibră optică?",
    options: ["Permit conectivitate full-duplex.", "Previn interferența crosstalk pe conexiune.", "Cele două fire permit datelor să călătorească pe distanțe mai mari fără degradare.", "Cresc viteza cu care datele călătoresc."],
    answer: 0,
    expl: "Lumina poate călători doar într-o singură direcție pe un singur fir de fibră. Pentru a permite comunicarea full-duplex, două fire de fibră trebuie conectate între fiecare dispozitiv."
  },
  {
    q: "Ce procedură este folosită pentru a reduce efectul crosstalk în cablurile de cupru?",
    options: ["Înfășurarea fasciculului de fire cu ecranare metalică", "Evitarea îndoiturilor bruște în timpul instalării", "Proiectarea infrastructurii de cabluri pentru a evita interferența crosstalk", "Necesitatea conexiunilor de împământare corespunzătoare", "Răsucirea perechilor de fire ale circuitelor opuse"],
    answer: 4,
    expl: "În cablurile de cupru, crosstalk este o perturbație cauzată de câmpurile electrice sau magnetice ale semnalului de pe un fir care interferează cu semnalul dintr-un fir adiacent. Răsucirea perechilor de fire opuse poate anula efectiv crosstalk-ul."
  },
  {
    q: "Care este un avantaj al utilizării cablului de fibră optică față de cablul de cupru?",
    options: ["Este de obicei mai ieftin decât cablul de cupru.", "Poate fi instalat în jurul curbelor ascuțite.", "Este mai ușor de terminat și instalat decât cablul de cupru.", "Poate transporta semnale pe distanțe mult mai mari decât cablul de cupru."],
    answer: 3,
    expl: "Cablul de cupru este de obicei mai ieftin și mai ușor de instalat decât fibra optică. Totuși, fibra optică are în general o rază de semnalizare mult mai mare decât cuprul."
  },
  {
    q: "Un administrator de rețea proiectează o nouă infrastructură care include conectivitate prin cablu și wireless. În ce situație ar fi recomandată o conexiune wireless?",
    options: ["Dispozitivul final are doar un NIC Ethernet.", "Dispozitivul final necesită o conexiune dedicată din motive de performanță.", "Dispozitivul final are nevoie de mobilitate la conectarea la rețea.", "Zona dispozitivului final are o concentrație ridicată de RFI (interferențe radio)."],
    answer: 2,
    expl: "Când dispozitivele finale au nevoie de mobilitate pentru a se conecta la rețea, wireless este recomandat. Dacă există RFI, wireless nu este recomandat. Un dispozitiv ce necesită performanță dedicată ar funcționa mai bine cu un cablu Ethernet."
  },
  {
    q: "Ce tip de cablu UTP este folosit pentru a conecta un PC la un port de switch?",
    options: ["Consolă (Console)", "Rollover", "Crossover", "Straight-through"],
    answer: 3,
    expl: "Un cablu rollover este un cablu proprietar Cisco folosit pentru conectarea la portul de consolă al unui router sau switch. Un cablu straight-through (patch) este folosit de obicei pentru a interconecta un host la un switch și un switch la un router."
  },
  {
    q: "Care este definiția lățimii de bandă (bandwidth)?",
    options: ["Viteza biților pe mediu într-o perioadă de timp dată", "Viteza cu care biții călătoresc în rețea", "Cantitatea de date care poate circula dintr-un loc în altul într-o perioadă de timp dată", "Măsura datelor utile transferate într-o perioadă de timp dată"],
    answer: 2,
    expl: "Lățimea de bandă este măsura capacității unui mediu de rețea de a transporta date. Este cantitatea de date care se poate mișca între două puncte din rețea într-o perioadă specifică de timp, de obicei o secundă."
  },
  {
    q: "Care afirmație descrie corect codificarea cadrelor (frame encoding)?",
    options: ["Folosește caracteristica unui semnal pentru a modifica alt semnal.", "Transmite semnale de date împreună cu un semnal de ceas la intervale regulate.", "Generează semnalele electrice, optice sau wireless care reprezintă numerele binare ale cadrului.", "Convertește biții într-un cod predefinit pentru a oferi un model previzibil care ajută la distingerea biților de date de biții de control."],
    answer: 3,
    expl: "Codificarea cadrelor convertește un flux de biți de date într-un cod predefinit recunoscut atât de emițător cât și de receptor. Aceste coduri sunt folosite în diverse scopuri, cum ar fi distingerea biților de date de biții de control."
  },
  {
    q: "Care este o caracteristică a cablului UTP (Unshielded Twisted Pair)?",
    options: ["Anulare (Cancellation)", "Înveliș (Cladding)", "Imunitate la pericole electrice", "Împletitură de cupru sau folie metalică"],
    answer: 0,
    expl: "Învelișul și imunitatea la pericole electrice sunt caracteristici ale cablului de fibră optică. Împletitura de cupru sau folia metalică este folosită ca ecran pentru conductorul coaxial interior. Anularea este o proprietate a UTP unde două fire adiacente anulează câmpurile magnetice reciproce."
  },
  {
    q: "O rețea LAN wireless este implementată în biroul unui paznic de parc, situat la cel mai înalt punct al parcului național. Tehnicienii raportează că semnalul LAN wireless este uneori afectat de un tip de interferență. Care este o cauză posibilă?",
    options: ["Cuptorul cu microunde", "Numărul mare de copaci din jur", "Locația înaltă unde a fost instalată rețeaua wireless", "Numărul de dispozitive wireless utilizate în rețea"],
    answer: 0,
    expl: "Conectivitatea LAN wireless nu este afectată de copaci sau de altitudinea echipamentului. Deoarece este un birou izolat cu un singur angajat, nu există o sursă semnificativă de interferență în afara unui cuptor cu microunde."
  },
  {
    q: "Care este scopul stratului fizic (Physical layer) al OSI?",
    options: ["Controlul accesului la mediu", "Transmiterea biților pe mediul local", "Detectarea erorilor în cadrele primite", "Schimbul de cadre între noduri pe mediile de rețea fizice"],
    answer: 1,
    expl: "Stratul fizic este responsabil cu transmiterea efectivă a semnalelor pe mediul fizic sub formă de biți. Schimbul de cadre, controlul accesului la mediu și detectarea erorilor sunt funcții ale stratului legătură de date."
  },
  {
    q: "Care caracteristică descrie crosstalk-ul?",
    options: ["Distorsiunea semnalului de rețea cauzată de iluminatul fluorescent", "Distorsiunea mesajelor transmise din cauza semnalelor de pe firele adiacente", "Slăbirea semnalului de rețea pe lungimi mari de cablu", "Pierderea semnalului wireless pe distanțe excesive față de punctul de acces"],
    answer: 1,
    expl: "EMI și RFI pot distorsiona semnalele de rețea din cauza interferenței de la lămpi fluorescente sau motoare electrice. Atenuarea duce la deteriorarea semnalului pe cablul de cupru. Crosstalk este perturbația cauzată de câmpurile electrice sau magnetice ale semnalului de pe un fir adiacent."
  },
  {
    q: "Ce indică termenul throughput (debit efectiv)?",
    options: ["Rata de transfer de date garantată oferită de un ISP", "Capacitatea unui anumit mediu de a transporta date", "Măsura datelor utile transferate pe mediu", "Măsura biților transferați pe mediu într-o perioadă de timp dată", "Timpul necesar unui mesaj să ajungă de la emițător la receptor"],
    answer: 3,
    expl: "Throughput-ul este măsura transferului de biți pe mediu într-o perioadă de timp dată. Este afectat de mulți factori (EMI, latență) și rareori corespunde lățimii de bandă specificate. Măsura datelor utile transferate se numește goodput."
  },
  {
    q: "Ce organizație de standardizare supraveghează dezvoltarea standardelor LAN wireless?",
    options: ["IANA", "IEEE", "ISO", "TIA"],
    answer: 1,
    expl: "IANA administrează alocarea adreselor IP și a numelor de domenii. ISO este cel mai mare dezvoltator de standarde internaționale de rețea (cunoscut pentru modelul OSI). TIA se concentrează pe standarde de comunicații. IEEE 802 include standardele Ethernet (802.3) și LAN wireless (802.11)."
  }
];

function renderQuiz(){
  const quiz = document.getElementById('quiz');
  quiz.innerHTML = questions.map((q, i) => `
    <section class="question" id="qcard-${i}">
      <div class="q-head"><span class="q-num">Întrebarea ${i+1}</span><span class="small">Cisco Modul 4</span></div>
      <div class="q-text">${esc(q.q)}</div>
      <div class="options">
        ${q.options.map((opt, j) => `
          <label class="option" id="q${i}o${j}">
            <input type="radio" name="q${i}" value="${j}">${esc(opt)}
          </label>`).join('')}
      </div>
      <div class="actions">
        <button class="btn-primary" onclick="checkQuestion(${i})">Verifică întrebarea</button>
        <button class="btn-secondary" onclick="showExplanation(${i})">Afișează explicația</button>
      </div>
      <div class="feedback" id="fb-${i}"></div>
    </section>
  `).join('');
}

function selectedIndex(i) {
  const el = document.querySelector(`input[name="q${i}"]:checked`);
  return el ? Number(el.value) : null;
}

function clearMarks(i) {
  questions[i].options.forEach((_, j) => {
    const lab = document.getElementById(`q${i}o${j}`);
    lab.classList.remove('correct-label', 'wrong-label');
  });
}

function checkQuestion(i) {
  const q = questions[i];
  const sel = selectedIndex(i);
  const fb = document.getElementById(`fb-${i}`);
  clearMarks(i);
  if (sel === null) {
    fb.className = 'feedback bad';
    fb.innerHTML = `<strong>Nu ai selectat niciun răspuns.</strong><div class="explanation"><strong>Explicație:</strong><br>${esc(q.expl)}</div>`;
    document.getElementById(`q${i}o${q.answer}`).classList.add('correct-label');
    return false;
  }
  const ok = sel === q.answer;
  document.getElementById(`q${i}o${q.answer}`).classList.add('correct-label');
  if (!ok) document.getElementById(`q${i}o${sel}`).classList.add('wrong-label');
  fb.className = 'feedback ' + (ok ? 'ok' : 'bad');
  fb.innerHTML = `${ok ? '✅ <strong>Corect!</strong>' : '❌ <strong>Greșit.</strong> Răspunsul corect este: <strong>' + esc(q.options[q.answer]) + '</strong>'}
    <div class="explanation"><strong>Explicație:</strong><br>${esc(q.expl)}</div>`;
  return ok;
}

function showExplanation(i) {
  const q = questions[i];
  const fb = document.getElementById(`fb-${i}`);
  clearMarks(i);
  document.getElementById(`q${i}o${q.answer}`).classList.add('correct-label');
  fb.className = 'feedback ok';
  fb.innerHTML = `<strong>Răspuns corect:</strong> ${esc(q.options[q.answer])}<div class="explanation"><strong>Explicație:</strong><br>${esc(q.expl)}</div>`;
}

function checkAll() {
  let score = 0;
  questions.forEach((_, i) => { if (checkQuestion(i)) score++; });
  document.getElementById('scoreBox').textContent = `Scor: ${score} / ${questions.length}`;
  window.scrollTo({top:0, behavior:'smooth'});
}

function resetQuiz() {
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  document.querySelectorAll('.feedback').forEach(f => { f.className='feedback'; f.innerHTML=''; });
  document.querySelectorAll('.option').forEach(o => o.classList.remove('correct-label','wrong-label'));
  document.getElementById('scoreBox').textContent = `Scor: - / ${questions.length}`;
}

renderQuiz();
</script>
</body>
</html>
