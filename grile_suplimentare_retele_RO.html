    function renderQuiz() {
      form.innerHTML = '';
      questions.forEach(function(q, qi) {
        var card = document.createElement('section');
        card.className = 'quiz-card';
        card.id = 'q' + qi;
        var head = document.createElement('div');
        head.className = 'q-head';
        head.innerHTML = '<span class="badge">Q' + (qi+1) + '</span><strong>Intrebarea ' + (qi+1) + ' din ' + questions.length + '</strong>';
        card.appendChild(head);
        var question = document.createElement('div');
        question.className = 'question';
        question.textContent = q.text;
        card.appendChild(question);
        if (q.type === 'multi') {
          var note = document.createElement('div');
          note.className = 'multi-note';
          note.textContent = 'Alege ' + q.choose + ' raspunsuri.';
          card.appendChild(note);
        }
        var optionsWrap = document.createElement('div');
        optionsWrap.className = 'options';
        q.options.forEach(function(opt, oi) {
          var label = document.createElement('label');
          label.className = 'option';
          label.setAttribute('data-q', qi);
          label.setAttribute('data-o', oi);
          var input = document.createElement('input');
          input.type = q.type === 'single' ? 'radio' : 'checkbox';
          input.name = 'q' + qi;
          input.value = oi;
          var span = document.createElement('span');
          span.textContent = opt;
          label.appendChild(input);
          label.appendChild(span);
          optionsWrap.appendChild(label);
        });
        card.appendChild(optionsWrap);
        var feedback = document.createElement('div');
        feedback.className = 'feedback';
        feedback.id = 'feedback-' + qi;
        card.appendChild(feedback);
        form.appendChild(card);
      });
    }
    function selectedFor(qi) {
      return Array.from(document.querySelectorAll('input[name="q' + qi + '"]:checked')).map(function(el) { return Number(el.value); }).sort(function(a,b){return a-b;});
    }
    function sameArray(a, b) {
      return a.length === b.length && a.every(function(v,i){return v===b[i];});
    }
    function checkQuiz() {
      var correctCount = 0;
      questions.forEach(function(q, qi) {
        var selected = selectedFor(qi);
        var answer = q.answer.slice().sort(function(a,b){return a-b;});
        var isCorrect = sameArray(selected, answer);
        if (isCorrect) correctCount++;
        document.querySelectorAll('label[data-q="' + qi + '"]').forEach(function(label) {
          label.classList.remove('correct-highlight', 'wrong-highlight');
          var oi = Number(label.getAttribute('data-o'));
          if (answer.indexOf(oi) >= 0) label.classList.add('correct-highlight');
          if (selected.indexOf(oi) >= 0 && answer.indexOf(oi) < 0) label.classList.add('wrong-highlight');
        });
        var feedback = document.getElementById('feedback-' + qi);
        var correctText = answer.map(function(i){return q.options[i];}).join(' / ');
        feedback.className = 'feedback ' + (isCorrect ? 'ok' : 'bad');
        feedback.innerHTML = isCorrect ? 'Corect!' : 'Incorect.<div class="correct-answer">Raspuns corect: ' + correctText + '</div>';
      });
      var percent = Math.round((correctCount / questions.length) * 100);
      document.getElementById('scoreBox').textContent = 'Scor: ' + correctCount + '/' + questions.length + ' (' + percent + '%)';
      window.scrollTo({top: 0, behavior: 'smooth'});
    }
    function resetQuiz() {
      document.querySelectorAll('input').forEach(function(input){input.checked=false;});
      document.querySelectorAll('.feedback').forEach(function(fb){fb.className='feedback';fb.innerHTML='';});
      document.querySelectorAll('label.option').forEach(function(label){label.classList.remove('correct-highlight','wrong-highlight');});
      document.getElementById('scoreBox').textContent = 'Scor: neverificat';
      window.scrollTo({top: 0, behavior: 'smooth'});
    }
    renderQuiz();
  </script>
</body>
</html>
