<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grile Cisco 12.9.4 - Adresare IPv6</title>
  <style>
    :root {
      --bg: #f4f7fb; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
      --accent: #0ea5e9; --accent-dark: #0284c7; --ok: #16a34a; --bad: #dc2626;
      --border: #dbe3ef; --soft: #eef6ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(180deg, #eef6ff 0%, var(--bg) 240px); color: var(--text); line-height: 1.5; }
    header { max-width: 1050px; margin: 0 auto; padding: 34px 18px 18px; }
    h1 { margin: 0 0 8px; font-size: clamp(26px, 4vw, 40px); }
    .subtitle { color: var(--muted); margin: 0; max-width: 780px; }
    main { max-width: 1050px; margin: 0 auto; padding: 12px 18px 50px; }
    .toolbar { position: sticky; top: 0; z-index: 20; background: rgba(244,247,251,0.92); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 16px; padding: 14px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between; margin: 0 0 18px; box-shadow: 0 10px 24px rgba(15,23,42,0.06); }
    .toolbar .score { font-weight: 700; color: var(--text); }
    button { border: 0; border-radius: 12px; padding: 11px 16px; font-weight: 700; cursor: pointer; transition: transform .08s ease, background .2s ease; }
    button:hover { transform: translateY(-1px); }
    .primary { background: var(--accent); color: white; }
    .primary:hover { background: var(--accent-dark); }
    .secondary { background: #e5e7eb; color: #111827; }
    .quiz-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin: 18px 0; box-shadow: 0 10px 28px rgba(15,23,42,0.05); }
    .q-head { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
    .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 42px; height: 32px; padding: 0 10px; border-radius: 999px; background: var(--soft); color: var(--accent-dark); font-weight: 800; }
    .multi-note { color: var(--muted); font-size: 14px; margin-top: 6px; }
    .question { font-size: 18px; font-weight: 700; margin: 8px 0 14px; }
    .options { display: grid; gap: 10px; margin-top: 12px; }
    label.option { display: grid; grid-template-columns: 26px 1fr; gap: 12px; align-items: start; padding: 13px 14px; border: 1px solid var(--border); border-radius: 12px; background: #fff; cursor: pointer; }
    label.option:hover { background: #f8fafc; }
    input { margin-top: 4px; transform: scale(1.15); }
    .feedback { display: none; margin-top: 15px; padding: 13px 14px; border-radius: 12px; font-weight: 700; }
    .feedback.ok { display: block; background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .feedback.bad { display: block; background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
    .correct-answer { margin-top: 8px; font-weight: 400; }
    .correct-highlight { border-color: #86efac !important; background: #f0fdf4 !important; }
    .wrong-highlight { border-color: #fca5a5 !important; background: #fff1f2 !important; }
    footer { color: var(--muted); text-align: center; font-size: 13px; padding: 12px 0 34px; }
  </style>
</head>
<body>
  <header>
    <h1>Grile Cisco - 12.9.4 Adresare IPv6</h1>
    <p class="subtitle">Quiz interactiv cu 15 intrebari. Bifeaza raspunsul/raspunsurile, apoi apasa Verifica raspunsurile.</p>
  </header>
  <main>
    <section class="toolbar">
      <div class="score" id="scoreBox">Scor: neverificat</div>
      <div>
        <button class="primary" onclick="checkQuiz()">Verifica raspunsurile</button>
        <button class="secondary" onclick="resetQuiz()">Reseteaza</button>
      </div>
    </section>
    <form id="quizForm"></form>
  </main>
  <footer>Fisier HTML generat pentru exersare individuala.</footer>
  <script>
    const questions = [
      {
        text: "Care este cel mai comprimat format valid posibil al adresei IPv6 2001:0DB8:0000:AB00:0000:0000:0000:1234?",
        type: "single",
        options: [
          "2001:DB8:0:AB::1234",
          "2001:DB8:0:AB:0:1234",
          "2001:DB8:0:AB00::1234",
          "2001:DB8::AB00::1234"
        ],
        answer: [2]
      },
      {
        text: "Care este prefixul asociat adresei IPv6 2001:DB8:D15:EA:CC44::1/64?",
        type: "single",
        options: [
          "2001:DB8::/64",
          "2001:DB8:D15:EA::/64",
          "2001:DB8:D15:EA:CC44::/64",
          "2001::/64"
        ],
        answer: [1]
      },
      {
        text: "Ce tip de adresa este atribuita automat unei interfete cand IPv6 este activat pe acea interfata?",
        type: "single",
        options: [
          "Global unicast",
          "Link-local",
          "Unique local",
          "Loopback"
        ],
        answer: [1]
      },
      {
        text: "Ce prefix de retea IPv6 este destinat doar link-urilor locale si nu poate fi rutat?",
        type: "single",
        options: [
          "FF00::/12",
          "FC00::/7",
          "FE80::/10",
          "2001::/3"
        ],
        answer: [2]
      },
      {
        text: "Care este scopul comenzii ping ::1?",
        type: "single",
        options: [
          "Testeaza configuratia interna a unui host IPv6.",
          "Testeaza accesibilitatea gateway-ului implicit pentru retea.",
          "Testeaza capacitatea de broadcast a tuturor hosturilor din subretea.",
          "Testeaza conectivitatea multicast catre toate hosturile din subretea."
        ],
        answer: [0]
      },
      {
        text: "Care este ID-ul de interfata al adresei IPv6 2001:DB8::1000:A9CD:47FF:FE57:FE94/64?",
        type: "single",
        options: [
          "47FF:FE57:FE94",
          "FE57:FE94",
          "1000:A9CD:47FF:FE57:FE94",
          "FE94",
          "A9CD:47FF:FE57:FE94"
        ],
        answer: [4]
      },
      {
        text: "Care este adresa de retea pentru adresa IPv6 2001:DB8:AA04:B5::1/64?",
        type: "single",
        options: [
          "2001:DB8::/64",
          "2001::/64",
          "2001:DB8:AA04:B5::/64",
          "2001:DB8:AA04::/64"
        ],
        answer: [2]
      },
      {
        text: "Ce tip de adresa nu este suportat in IPv6?",
        type: "single",
        options: [
          "Multicast",
          "Unicast",
          "Broadcast",
          "Privata"
        ],
        answer: [2]
      },
      {
        text: "Ce indica un ping reusit catre adresa IPv6 ::1?",
        type: "single",
        options: [
          "IP este instalat corect pe host.",
          "Hostul este cablat corect.",
          "Adresa link-local este configurata corect.",
          "Toate hosturile din link-ul local sunt disponibile.",
          "Adresa de gateway implicit este configurata corect."
        ],
        answer: [0]
      },
      {
        text: "Care este cea mai comprimata reprezentare a adresei IPv6 2001:0db8:0000:abcd:0000:0000:0000:0001?",
        type: "single",
        options: [
          "2001:0db8:abcd::0001",
          "2001:db8:0:abcd::1",
          "2001:0db8:abcd::1",
          "2001:0db8:0000:abcd::1",
          "2001:db8::abcd:0:1"
        ],
        answer: [1]
      },
      {
        text: "Care este configuratia minima pentru o interfata de router activata pentru IPv6?",
        type: "single",
        options: [
          "Sa aiba o adresa IPv6 link-local",
          "Sa aiba o adresa loopback generata automat",
          "Sa aiba atat o adresa IPv6 link-local cat si o adresa global unicast",
          "Sa aiba atat o adresa IPv4 cat si una IPv6"
        ],
        answer: [0]
      },
      {
        text: "Ce adresa este cel putin necesara pe interfetele activate IPv6?",
        type: "single",
        options: [
          "Link-local",
          "Global unicast",
          "Site local",
          "Unique local"
        ],
        answer: [0]
      },
      {
        text: "Care sunt cele trei parti ale unei adrese IPv6 global unicast? (Alege trei.)",
        type: "multi",
        choose: 3,
        options: [
          "Un ID de subretea folosit pentru a identifica retelele din interiorul site-ului local al intreprinderii",
          "Un prefix de rutare global folosit pentru a identifica portiunea de adresa de retea furnizata de un administrator local",
          "Un ID de interfata folosit pentru a identifica reteaua locala pentru un anumit host",
          "Un ID de interfata folosit pentru a identifica hostul local din retea",
          "Un prefix de rutare global folosit pentru a identifica portiunea de retea a adresei furnizata de un ISP"
        ],
        answer: [0, 3, 4]
      },
      {
        text: "Organizatia voastra a primit prefixul IPv6 2001:db8:130f::/48 de la furnizorul de servicii. Cu acest prefix, cati biti sunt disponibili pentru a crea subretele /64 daca nu sunt imprumutati biti din ID-ul de interfata?",
        type: "single",
        options: ["128", "16", "8", "80"],
        answer: [1]
      },
      {
        text: "Ce tip de adresa IPv6 nu poate fi rutat si este folosit doar pentru comunicarea pe o singura subretea?",
        type: "single",
        options: [
          "Adresa nespecificata (Unspecified address)",
          "Adresa loopback",
          "Adresa link-local",
          "Adresa global unicast",
          "Adresa unique local"
        ],
        answer: [2]
      }
    ];

    const form = document.getElementById('quizForm');
    function renderQuiz() {
      form.innerHTML = '';
      questions.forEach((q, qi) => {
        const card = document.createElement('section');
        card.className = 'quiz-card';
        card.id = 'q' + qi;
        const head = document.createElement('div');
        head.className = 'q-head';
        head.innerHTML = '<span class="badge">Q'+(qi+1)+'</span><strong>Intrebarea '+(qi+1)+' din '+questions.length+'</strong>';
        card.appendChild(head);
        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        qDiv.textContent = q.text;
        card.appendChild(qDiv);
        if (q.type === 'multi') {
          const note = document.createElement('div');
          note.className = 'multi-note';
          note.textContent = 'Alege ' + q.choose + ' raspunsuri.';
          card.appendChild(note);
        }
        const wrap = document.createElement('div');
        wrap.className = 'options';
        q.options.forEach((opt, oi) => {
          const label = document.createElement('label');
          label.className = 'option';
          label.setAttribute('data-q', qi);
          label.setAttribute('data-o', oi);
          const input = document.createElement('input');
          input.type = q.type === 'single' ? 'radio' : 'checkbox';
          input.name = 'q' + qi;
          input.value = oi;
          const span = document.createElement('span');
          span.textContent = opt;
          label.appendChild(input);
          label.appendChild(span);
          wrap.appendChild(label);
        });
        card.appendChild(wrap);
        const fb = document.createElement('div');
        fb.className = 'feedback';
        fb.id = 'feedback-' + qi;
        card.appendChild(fb);
        form.appendChild(card);
      });
    }
    function selectedFor(qi) {
      return Array.from(document.querySelectorAll('input[name="q'+qi+'"]:checked')).map(el => Number(el.value)).sort((a,b)=>a-b);
    }
    function sameArray(a, b) { return a.length === b.length && a.every((v,i) => v === b[i]); }
    function checkQuiz() {
      let correctCount = 0;
      questions.forEach((q, qi) => {
        const selected = selectedFor(qi);
        const answer = [...q.answer].sort((a,b)=>a-b);
        const isCorrect = sameArray(selected, answer);
        if (isCorrect) correctCount++;
        document.querySelectorAll('label[data-q="'+qi+'"]').forEach(label => {
          label.classList.remove('correct-highlight', 'wrong-highlight');
          const oi = Number(label.getAttribute('data-o'));
          if (answer.includes(oi)) label.classList.add('correct-highlight');
          if (selected.includes(oi) && !answer.includes(oi)) label.classList.add('wrong-highlight');
        });
        const fb = document.getElementById('feedback-' + qi);
        const correctText = answer.map(i => q.options[i]).join(' / ');
        fb.className = 'feedback ' + (isCorrect ? 'ok' : 'bad');
        fb.innerHTML = isCorrect ? 'Corect!' : 'Incorect.<div class="correct-answer">Raspuns corect: ' + correctText + '</div>';
      });
      const percent = Math.round((correctCount / questions.length) * 100);
      document.getElementById('scoreBox').textContent = 'Scor: ' + correctCount + '/' + questions.length + ' (' + percent + '%)';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function resetQuiz() {
      document.querySelectorAll('input').forEach(input => input.checked = false);
      document.querySelectorAll('.feedback').forEach(fb => { fb.className = 'feedback'; fb.innerHTML = ''; });
      document.querySelectorAll('label.option').forEach(label => label.classList.remove('correct-highlight', 'wrong-highlight'));
      document.getElementById('scoreBox').textContent = 'Scor: neverificat';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    renderQuiz();
  </script>
</body>
</html>
