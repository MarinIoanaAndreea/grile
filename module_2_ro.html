<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grile Cisco Modul 2 - Quiz interactiv</title>
  <style>
    :root {
      --bg: #f4f7fb; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
      --accent: #0ea5e9; --accent-dark: #0284c7; --ok: #16a34a; --bad: #dc2626;
      --border: #dbe3ef; --soft: #eef6ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(180deg, #eef6ff 0%, var(--bg) 240px); color: var(--text); line-height: 1.5; }
    header { max-width: 1050px; margin: 0 auto; padding: 34px 18px 18px; }
    h1 { margin: 0 0 8px; font-size: clamp(26px, 4vw, 40px); }
    .subtitle { color: var(--muted); margin: 0; max-width: 780px; }
    main { max-width: 1050px; margin: 0 auto; padding: 12px 18px 50px; }
    .toolbar { position: sticky; top: 0; z-index: 20; background: rgba(244,247,251,0.92); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 16px; padding: 14px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between; margin: 0 0 18px; box-shadow: 0 10px 24px rgba(15,23,42,0.06); }
    .toolbar .score { font-weight: 700; color: var(--text); }
    button { border: 0; border-radius: 12px; padding: 11px 16px; font-weight: 700; cursor: pointer; transition: transform .08s ease, background .2s ease; }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .primary { background: var(--accent); color: white; }
    .primary:hover { background: var(--accent-dark); }
    .secondary { background: #e5e7eb; color: #111827; }
    .quiz-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin: 18px 0; box-shadow: 0 10px 28px rgba(15,23,42,0.05); }
    .q-head { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
    .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 42px; height: 32px; padding: 0 10px; border-radius: 999px; background: var(--soft); color: var(--accent-dark); font-weight: 800; }
    .multi-note { color: var(--muted); font-size: 14px; margin-top: 6px; }
    .question { font-size: 18px; font-weight: 700; margin: 8px 0 14px; }
    .options { display: grid; gap: 10px; margin-top: 12px; }
    label.option { display: grid; grid-template-columns: 26px 1fr; gap: 12px; align-items: start; padding: 13px 14px; border: 1px solid var(--border); border-radius: 12px; background: #fff; cursor: pointer; }
    label.option:hover { background: #f8fafc; }
    input { margin-top: 4px; transform: scale(1.15); }
    .feedback { display: none; margin-top: 15px; padding: 13px 14px; border-radius: 12px; font-weight: 700; }
    .feedback.ok { display: block; background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .feedback.bad { display: block; background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
    .correct-answer { margin-top: 8px; font-weight: 400; }
    .correct-highlight { border-color: #86efac !important; background: #f0fdf4 !important; }
    .wrong-highlight { border-color: #fca5a5 !important; background: #fff1f2 !important; }
    footer { color: var(--muted); text-align: center; font-size: 13px; padding: 12px 0 34px; }
  </style>
</head>
<body>
  <header>
    <h1>Grile Cisco - Modul 2</h1>
    <p class="subtitle">Quiz interactiv cu 14 întrebări. Bifează răspunsul/răspunsurile, apoi apasă „Verifică răspunsurile".</p>
  </header>
  <main>
    <section class="toolbar">
      <div class="score" id="scoreBox">Scor: neverificat</div>
      <div>
        <button class="primary" onclick="checkQuiz()">Verifică răspunsurile</button>
        <button class="secondary" onclick="resetQuiz()">Resetează</button>
      </div>
    </section>
    <form id="quizForm"></form>
  </main>
  <footer>Fișier HTML generat pentru exersare individuală.</footer>
  <script>
    const questions = [
      {
        text: "Care afirmație este adevărată despre fișierul de configurare curent (running configuration) dintr-un dispozitiv Cisco IOS?",
        type: "single",
        options: [
          "Afectează imediat funcționarea dispozitivului atunci când este modificat.",
          "Este stocat în NVRAM.",
          "Trebuie șters folosind comanda erase running-config.",
          "Este salvat automat când routerul repornește."
        ],
        answer: [0]
      },
      {
        text: "Care două afirmații sunt adevărate despre modul User EXEC? (Alege două.)",
        type: "multi",
        choose: 2,
        options: [
          "Toate comenzile routerului sunt disponibile.",
          "Modul Global Configuration poate fi accesat introducând comanda enable.",
          "Promptul dispozitivului în acest mod se termină cu simbolul '>'.",
          "Interfețele și protocoalele de rutare pot fi configurate.",
          "Doar unele aspecte ale configurației routerului pot fi vizualizate."
        ],
        answer: [2, 4]
      },
      {
        text: "Ce tip de acces este securizat pe un router sau switch Cisco cu comanda enable secret?",
        type: "single",
        options: [
          "Linia de consolă (Console line)",
          "Privileged EXEC",
          "Terminal virtual (Virtual terminal)",
          "Port AUX"
        ],
        answer: [1]
      },
      {
        text: "Care este interfața SVI implicită pe un switch Cisco?",
        type: "single",
        options: [
          "VLAN1",
          "VLAN99",
          "VLAN100",
          "VLAN999"
        ],
        answer: [0]
      },
      {
        text: "Când un hostname este configurat prin Cisco CLI, care trei convenții de denumire fac parte din ghiduri? (Alege trei.)",
        type: "multi",
        choose: 3,
        options: [
          "Hostname-ul trebuie să aibă mai puțin de 64 de caractere.",
          "Hostname-ul trebuie să fie scris cu litere mici.",
          "Hostname-ul nu trebuie să conțină spații.",
          "Hostname-ul trebuie să se termine cu un caracter special.",
          "Hostname-ul trebuie să înceapă cu o literă."
        ],
        answer: [0, 2, 4]
      },
      {
        text: "Care este funcția shell-ului într-un sistem de operare (OS)?",
        type: "single",
        options: [
          "Interacționează cu hardware-ul dispozitivului.",
          "Face interfața între utilizatori și kernel.",
          "Oferă servicii dedicate de firewall.",
          "Oferă servicii de protecție împotriva intruziunilor pentru dispozitiv."
        ],
        answer: [1]
      },
      {
        text: "Un router cu un sistem de operare valid conține un fișier de configurare stocat în NVRAM. Fișierul de configurare are o parolă enable secret, dar nu are parolă de consolă. Când routerul pornește, ce mod va fi afișat?",
        type: "single",
        options: [
          "Modul Global Configuration",
          "Modul Setup",
          "Modul Privileged EXEC",
          "Modul User EXEC"
        ],
        answer: [3]
      },
      {
        text: "Un administrator tocmai a schimbat adresa IP a unei interfețe pe un dispozitiv IOS. Ce altceva trebuie făcut pentru a aplica modificările pe dispozitiv?",
        type: "single",
        options: [
          "Nu trebuie făcut nimic. Modificările configurației pe un dispozitiv IOS intră în vigoare imediat ce comanda este tastată corect și se apasă Enter.",
          "Repornește dispozitivul și tastează yes când ești întrebat dacă salvezi configurația.",
          "Copiază informațiile din fișierul startup configuration în running configuration.",
          "Copiază running configuration în fișierul startup configuration."
        ],
        answer: [0]
      },
      {
        text: "Ce locație de memorie de pe un router sau switch Cisco va pierde tot conținutul când dispozitivul este repornit?",
        type: "single",
        options: [
          "ROM",
          "Flash",
          "NVRAM",
          "RAM"
        ],
        answer: [3]
      },
      {
        text: "De ce ar introduce un tehnician comanda copy startup-config running-config?",
        type: "single",
        options: [
          "Pentru a face din configurația modificată noua configurație de pornire.",
          "Pentru a elimina toate configurațiile de pe switch.",
          "Pentru a copia o configurație existentă în RAM.",
          "Pentru a salva o configurație activă în NVRAM."
        ],
        answer: [2]
      },
      {
        text: "Ce funcționalitate oferă DHCP?",
        type: "single",
        options: [
          "Administrare remotă a switch-ului",
          "Test de conectivitate de la un capăt la altul",
          "Traducerea adreselor IP în nume de domenii",
          "Atribuirea automată a unei adrese IP fiecărui host"
        ],
        answer: [3]
      },
      {
        text: "Care două funcții sunt oferite utilizatorilor de funcția de ajutor contextual (context-sensitive help) a Cisco IOS CLI? (Alege două.)",
        type: "multi",
        choose: 2,
        options: [
          "Afișarea unei liste cu toate comenzile disponibile în modul curent.",
          "Permite utilizatorului să completeze restul unei comenzi prescurtate cu tasta TAB.",
          "Oferă un mesaj de eroare când se introduce o comandă greșită.",
          "Determină ce opțiune, cuvânt cheie sau argument este disponibil pentru comanda introdusă.",
          "Selectează cea mai bună comandă pentru a îndeplini o sarcină."
        ],
        answer: [0, 3]
      },
      {
        text: "Ce locație de memorie de pe un router sau switch Cisco stochează fișierul de configurare de pornire (startup configuration)?",
        type: "single",
        options: [
          "RAM",
          "ROM",
          "NVRAM",
          "Flash"
        ],
        answer: [2]
      },
      {
        text: "Cărei subrețele aparține adresa IP 10.1.100.50 dacă se folosește masca de subrețea 255.255.0.0?",
        type: "single",
        options: [
          "10.1.100.0",
          "10.1.0.0",
          "10.0.0.0",
          "10.1.100.32"
        ],
        answer: [1]
      }
    ];

    const form = document.getElementById('quizForm');

    function renderQuiz() {
      form.innerHTML = '';
      questions.forEach((q, qi) => {
        const card = document.createElement('section');
        card.className = 'quiz-card';
        card.id = `q${qi}`;
        const head = document.createElement('div');
        head.className = 'q-head';
        head.innerHTML = `<span class="badge">Q${qi + 1}</span><strong>Întrebarea ${qi + 1} din ${questions.length}</strong>`;
        card.appendChild(head);
        const question = document.createElement('div');
        question.className = 'question';
        question.textContent = q.text;
        card.appendChild(question);
        if (q.type === 'multi') {
          const note = document.createElement('div');
          note.className = 'multi-note';
          note.textContent = `Alege ${q.choose} răspunsuri.`;
          card.appendChild(note);
        }
        const optionsWrap = document.createElement('div');
        optionsWrap.className = 'options';
        q.options.forEach((opt, oi) => {
          const label = document.createElement('label');
          label.className = 'option';
          label.setAttribute('data-q', qi);
          label.setAttribute('data-o', oi);
          const input = document.createElement('input');
          input.type = q.type === 'single' ? 'radio' : 'checkbox';
          input.name = `q${qi}`;
          input.value = oi;
          const span = document.createElement('span');
          span.textContent = opt;
          label.appendChild(input);
          label.appendChild(span);
          optionsWrap.appendChild(label);
        });
        card.appendChild(optionsWrap);
        const feedback = document.createElement('div');
        feedback.className = 'feedback';
        feedback.id = `feedback-${qi}`;
        card.appendChild(feedback);
        form.appendChild(card);
      });
    }

    function selectedFor(qi) {
      return Array.from(document.querySelectorAll(`input[name="q${qi}"]:checked`)).map(el => Number(el.value)).sort((a, b) => a - b);
    }

    function sameArray(a, b) {
      return a.length === b.length && a.every((v, i) => v === b[i]);
    }

    function checkQuiz() {
      let correctCount = 0;
      questions.forEach((q, qi) => {
        const selected = selectedFor(qi);
        const answer = [...q.answer].sort((a, b) => a - b);
        const isCorrect = sameArray(selected, answer);
        if (isCorrect) correctCount++;
        document.querySelectorAll(`label[data-q="${qi}"]`).forEach(label => {
          label.classList.remove('correct-highlight', 'wrong-highlight');
          const oi = Number(label.getAttribute('data-o'));
          if (answer.includes(oi)) label.classList.add('correct-highlight');
          if (selected.includes(oi) && !answer.includes(oi)) label.classList.add('wrong-highlight');
        });
        const feedback = document.getElementById(`feedback-${qi}`);
        const correctText = answer.map(i => q.options[i]).join(' / ');
        feedback.className = `feedback ${isCorrect ? 'ok' : 'bad'}`;
        feedback.innerHTML = isCorrect ? 'Corect!' : `Incorect.<div class="correct-answer">Răspuns corect: ${correctText}</div>`;
      });
      const percent = Math.round((correctCount / questions.length) * 100);
      document.getElementById('scoreBox').textContent = `Scor: ${correctCount}/${questions.length} (${percent}%)`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetQuiz() {
      document.querySelectorAll('input').forEach(input => input.checked = false);
      document.querySelectorAll('.feedback').forEach(fb => { fb.className = 'feedback'; fb.innerHTML = ''; });
      document.querySelectorAll('label.option').forEach(label => { label.classList.remove('correct-highlight', 'wrong-highlight'); });
      document.getElementById('scoreBox').textContent = 'Scor: neverificat';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderQuiz();
  </script>
</body>
</html>
